front:
  text: 鍾序天地陰陽風寒暑濕冷暖虛實各因其人體氣以受病各因其地時氣以致疾原非一概而論即如兩人同一病致病受病就有不同並有一人一身前後同一病而筋絡臟腑之行又有不同命之理微地之理微醫之理亦微所謂失之毫釐謬以千里誠不我欺迥乎難挽甚未容易言醫其故或在認症之不真學問所不到譬之行兵臨陳有所不久不久而即不熟且人之受病有內有外有虛有實有火有寒有陰有陽有暑濕而似乎虛弱有虛弱而類乎風邪是凡醫家不可以不細加體察豫風塵薄宦無濟世之力有救人之心無論其力之能與不能而心之再無下盡其到也偶與友人沈月枝論及世道人心因而就病談醫於是乎渠欣欣然出示筆花醫鏡一書書系抄本豫捧而翻閲恐不克久而不忘且此等書果可以濟世救人何妨共諸同好豫驟然付梓刊印布告同人或為醫家之一助不沒江公一片婆心云爾是為序道光十四年仲冬之月上浣皖江古舒鍾承露謹序自序天下之至變者病也天下之至精者醫也欲極其精以窮其變雖千萬言不足以發明其緒是以岐雷貸季而後名家輩出議論紛如而合諸病情變幻有難以按圖而索驥者暾何人斯而敢以一二淺言謂足以罄乃事乎然至變者病而可見者恃乎形至精者醫而可據者恃乎理以形求理即以簡馭繁達乎此通乎彼固有千萬言所不能盡而一二語足以賅之矣暾自中歲究心醫學往來於江浙之間深知其難亦不敢自安於拙逮服官東粵學漸荒蕪而習見此邦醫士如文家相題布局理法未清其何以司活人之柄耶病家固不甚講求但以神鬼為福即偶延醫診而默受其誤者亦終莫之知是誠不服藥為良矣可慨也夫暾久思引救礙於官針茲將引退還山略舉其要鐫為一編俾人人得有簡要之方偶遇一症自可按對病情審為何臟何腑是陰是陽不乖乎表裡虛實寒熱之真即知為心肝脾胃肺腎之疾症既洞徹藥自效靈較諸授命於瞽以身為鵠者其損益可昭然判也誠願有志者熟玩是編據為要領而旁參諸大家之説自可一覽瞭然將近以事親遠以濟衆於生靈不無稍補焉是為序時道光四年孟夏之月上浣浙江歸安江涵暾自序
