body:
  text: 例論數頁書豈能療千萬病然有綱舉目張之法蓋病總由臟腑總不外虛實寒熱審知其為何臟何腑之虛症實症寒症熱症而聯其病類以集之則藥歸同路療一病可療千萬病亦無不可固不在多立病名多立方書也此所謂鏡也凡人不願知醫者以卷帙浩繁見而生畏不知從何學起也茲但言其現何病象系何臟腑作何治法寥寥數語亦易知矣其一切經絡源委概不縷敘避繁賾也若欲究其全則自有諸名家書在用藥如用兵須量其材力之大小蓋有一利即有一弊如大補大攻大寒大熱之品誤用即能殺人各部後分為猛將次將俾閲者不敢輕用即用亦必斟酌分量庶知利害人生一小天地病之輕者如日月之食不轉瞬自必回和斷不可輕易服藥恐益乎此則損乎彼也暾閲歷既久悉知其故寧受衆怨不輕徇情此事如老將臨陳大賈航海愈歷煉而愈知畏耳是書淺近説法別無精意不過願人人稍知醫理不為庸醫所誤以延壽命且鄉僻間不及延醫者亦可對症自醫取其便耳至醫家讀書少而閲歷淺者得此亦有頭緒稍知把握便可活人醫家首在立品古人云行欲方而智欲圓心欲小而膽欲大人之性命在我掌握中專心揣求尚虞有失此事豈同兒戲乎若一涉利心則貧富歧視同道相攻偽藥欺售置人命於腦後矣試仰觀蒼蒼者何物耶而為病家者亦宜以上賓禮貌相待須思此人為我父母妻子救命而來豈可任我招之來麾之去也是編大半採仲景東垣景嶽鍾齡諸家之説亦述而不作之意凡古人立方寓有精意然斷不可呆用余嘗見淺醫未經閲歷遇暑倦輒用清暑益氣湯而不知黃耆之悶遇熱喘輒用生脈散而不知五味子之斂卒至暑熱伏留纏綿床蓐而斃甚可哀也他如六味地黃湯及麻黃湯桂枝湯等必須斟酌萬穩而進或用次將之品代之否則一誤之下不可挽回歸咎古人古人豈任受哉
