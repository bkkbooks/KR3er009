body:
  text: 卷三兒科證治兒科論治小兒之病百倍難於方脈其疾痛疴癢不能自言旁人又不能代言全恃醫家以意揣之揣之不合殺人易於反掌即揣得其當而小兒純陽之體易虛易實藥一過分變幻百端此非絶頂聰明好學深思心知其意者未易勝任也至於護惜之深姑息之至則飽暖失宜果物恣食畏苦廢藥或求速雜投則又非醫家之咎矣然揣之之法不過辨其表裡虛實寒熱其法與方脈無異其症亦與方脈同方脈中之病小兒亦無不有也故不能兒科者或能治方脈不能方脈者必不能治兒科初生保治初生三朝即用三黃湯解其胎毒服三四日後每日投金銀花湯至彌月而止可保其痘稀而少瘡疹之患若遇寒冬之月或小兒體寒質薄則專用金銀花湯亦可彌月間聲直髮搐撮口臍風是胎風也俗名腹裡驚因其母肝氣素郁兒稟受之再浴時斷臍時或有進風得外風則內風動此症發之太早泣不出聲泣而無淚者皆難治治法痰盛者先治痰火盛者先清火或用益黃散治之視其牙齦有泡急以綿裹指擦破之用青黛冰片略塗口內為妙至三歲以前形質微弱無脈可憑但察其脈之強弱緩急而已須更審其食指寅卯辰三關男左女右食指近手第一節為寅關次節為卯關上節為辰關凡兒有病必有脈紋外現如現紋在寅關不過卯關者易治連卯關者難治過辰關者更難治若一條紋從寅關直透卯透辰者必死其紋青色為風紫為瀉利青紫為肝木乘脾紅則為熱合之唇舌面色亦可得其大概也三歲後六七至為平脈四五至為寒九十至為困脈弦急為氣不和沉緩為傷食促結為虛驚浮為風沉細為寒脈亂者不治外熱內熱辨外熱與內熱不同外熱者身終日發熱或拘束肢冷外有清涕咳嗽頭痛鼻塞之象內則脈浮而不渴此外解之症也不可用涼藥宜荊防散表之得汗自愈內熱者如夜熱潮熱晝輕夜重病最纏綿或口渴或腹脹或盜汗其症有因傷食停痞伏燥伏火陰虛陽虛等異宜分別而治此內解之症也不可用表藥傷食者保和丸加地骨皮消之停痞者和中丸加鱉甲牡蠣消之伏燥者貝母栝蔞散潤之伏火者黃芩芍藥湯加山梔丹皮等清之陰虛者蒿皮四物湯退之陽虛者四君子湯養之此等熱久必傷陰日漸削瘦成為疳癆慎勿忽視非驚論方脈中有中寒中暑諸症時醫混以為中風東垣景嶽以非風別之善矣兒科有急驚風慢驚風二症不惟驚字全無干涉即風字亦未可混稱乃自有驚風之名而濫以丸子相投從此小兒之遭其劫者不知萬萬矣試思驚字何解凡受嚇者謂之驚嚇則神魂失守心神恍惚惕惕悸動唯心虛者易犯此在方脈中亦有之兒科中大驚猝恐一症即此候也是真驚也故用藥以人參五味棗仁丹參等安神定魂為主斷無有攻痰散風而能治驚症者且風字亦有二義在外感則為風邪宜用表散在內病則為肝風宜用鎮息今混言之曰風究竟外風乎內風乎治外風之藥不可以治肝治肝風之藥不可以解表甚矣哉其混也蓋時俗所謂急驚風者痰火閉也小兒受暑熱則生火乳積則生痰痰火相搏則血虛而肝失所養肝主筋筋脈乾熱則抽搐故外作拘攣面現青色是肝燥而風內動非外風也是痰火閉其竅而目竄牙緊發厥非嚇驚也但利其竅清其火降其痰則神醒矣此症即不醫亦能自醒而漫以驚風名之可乎世俗所謂慢驚風者脾虛生風也小兒或吐或瀉久則脾虛肝木乘之手足微搐是內風侮土非外風也陽衰神怠氣息短促是中氣脫乏非嚇驚也宜補其脾回其陽則土振而木靜矣此症不補必死而謬以驚風名之可乎且急驚為實火症慢驚為虛寒症如水火然治急驚藥不可以治慢治慢驚藥不可以治急而世俗竟有以一粒丹丸名之曰治急慢驚風欺人乎欺天乎茲特並揭之曰非驚而分為痰火閉症木侮土症則為實為虛當各求其病源而治之而小兒庶不至於枉死痰火閉症痰火之症即俗所謂急驚風也小兒或感風寒或積乳食皆能生痰痰積則化火或受暑熱亦生火失於清解則火升而痰亦升痰火上壅閉其肺竅則諸竅皆閉其症目直氣喘昏悶不醒且火甚則肝燥筋急為搐搦掣顫反引竄視而八候生焉總因痰火鬱結肝風內動而成當其拘攣弓仰之時但以手扶勿可用力抱緊傷其筋絡致成廢疾初起以通關散開其嚏得嚏則醒輕者利火降痰湯重者清膈煎加石菖蒲竹茹或抱龍丸醒後清熱養血湯木侮土症木侮土症即俗所謂慢驚風也小兒受暑受寒或傷乳食皆能作吐作瀉或吐瀉交作久則脾土虛弱肝木乘之其瀉漸見青色面部痿白帶青手足微搐無力神氣懨懨不振而慢脾成矣初起即宜異功散吐則加藿香煨姜若病已數日糞見青色即加木香或肉桂若手足皆冷脈息微細唇舌痿白此將脫之症宜急用附子理中湯以溫中回陽尚有可救諸臟之症皆緩獨脾病之變甚速盡有吐瀉一晝夜而即脫者慎勿緩視也大驚猝恐大驚猝恐真驚也小兒氣血未充心神怯弱一遇驚嚇則神魂震怖舉動失常夜則跳醒晝則驚惕治宜安神魂斂心氣七福飲祕旨安神丸安神定志湯皆可心有蘊熱而驚悸者七味安神丸神定後氣虛者四君子湯以補其陽血虛者六味地黃丸以補其陰若妄投以硃砂鎮驚丸子耗其心血則愈發愈盛肝風乘虛而亢其勢不可復製矣慎之夜啼夜啼之症有二一曰脾寒一曰心熱若僅胃停乳食則不能安寐而已不啼也脾寒者溫其脾而啼止藿香和中湯主之心熱者清其心而啼亦止導赤散加川連主之或花火膏亦可切勿亂投消痰破氣之藥致損真元吐瀉小兒吐瀉之症最多或專吐或專瀉或吐瀉交作其因傷食而吐瀉者腹必硬所吐所瀉必有酸臭氣保和丸消之因伏暑而吐瀉者小水必不利必兼煩渴吐則香薷飲瀉則四苓散加益元散或導赤散加川連清之因受寒而吐瀉者唇舌面色必痿白口不渴四肢或冷此症易成慢脾始則平胃散二陳湯加煨姜以溫其中繼則六君子湯以補其脾若虛寒甚則附子理中湯不可稍緩其因伏火而吐瀉者身必熱唇舌必赤清中飲導之火退後仍宜四君子湯以養其脾蓋火吐則乳飲不得入一入即出寒吐則乳飲受而後出此其辨也然吐瀉久則脾胃必虛肝木必侮無論因何而起凡大吐大瀉之後即有火亦清有食亦出速宜培補脾陽勿使氣脫傷暑小兒性秉純陽不受火迫一染邪暑熱焰沸張其症肌熱煩躁口渴唇紅溺澀急宜香薷飲調服益元散以解之且暑中有濕濕易傷脾故每作瀉利甚者兼吐治法詳吐瀉門若受暑風而清涕頭痛者用香薷飲加秦艽荊芥主之若熱動肝風而發搐厥宜用清熱湯利其暑熱而風自息昏悶者通關散啓其嚏切勿輕用治驚化痰之品戕其正氣變生他症食積痞積蟲積痰積水積諸積皆屬於脾脾土果旺則何物不化至於成積脾力之弱可知已然積既已成勢不能不用藥以消夫欲消困脾之積必更傷受困之脾願治積者必時時顧念脾土而後可食積者肚腹必硬膨脹拒按吞酸噯腐不思飲食保和丸大和中飲等消之脾虛者六君子湯參用痞積者或瘧後痰結或血裹肝氣伏於脅下時痛時止和中丸消之外貼消痞膏氣虛者六君子湯參用蟲積者濕熱所化也蟲有九而血鱉最狠蝤蟲最馴寸白蟲上能蝕肺柳葉蟲下能蝕肝凡患蟲症則唇內起白點若蟲長一尺貫胃則危衝心則死其人日漸消瘦蟲則吸血自肥當以化蟲丸下之腹痛則服花椒湯蟲聞椒則伏也下後仍以異功散養脾痰積者飲食所積脾不能化則釀而為痰其症初起時兩脈皆弦腹漸脹大而軟急宜六君子湯加厚朴麥芽萊蔔子等以消之若遷延日久則痰積愈多一旦上湧發為厥逆則吐之不能下之不得無藥可治也水積者即水腫之症治法具詳卷一疳症疳者干也久熱傷陰津液乾涸之症俗名童子癆其症總因飲食不節積滯化火漸或生痞生蟲致成骨蒸內熱銷灼其陰其症腹大青筋髮直毛焦肌膚枯燥唇舌絳紅而疳症成矣此症陰血既槁勢已難回況又有熱未清積未去乎善治者必乘其陰血未槁之時清其火消其積育其陰調其脾胃尚克有濟初治宜清熱導滯湯有蟲者唇內起白點以化蟲丸間服若陰分既虛則用理陰和中煎胃口不開則並用異功散調其胃俾得陽生陰長庶幾有救大約此症腹軟者雖虛可治為其能受補也腹硬者難治為其不可消也盜汗自汗盜汗為陰虛自汗為陽虛然亦有秉質如此終歲習以為常此不必治也若平日並無此症又非夏秋暑月而無端盜汗者宜四物湯加龍骨牡蠣浮小麥北五味之屬以養其陰無端自汗者宜四君子湯加北五味牡蠣以養其陽或加玉屏風散亦可咳嗽小兒咳嗽半由於風寒初起以杏蘇煎散之痰薄者加半夏生薑痰濃者加川貝花粉栝蔞仁之屬肺有火邪則瀉白散此一定之治法也若秋冬燥令肺受火刑則咳而無痰甚者咳血宜以貝母栝蔞散潤其肺清肅之氣下行則咳自止解顱龜胸龜背解顱者腦蓋未滿頭顱不合中陷而四角起如古錢之形此先天不足所致暑月服六味地黃丸冬春之月補天大造丸俟氣虛漸充則自合矣龜胸者肺熱作脹胸骨高起須白虎湯加瀉白散以涼肺氣若喘急者難治也龜背者背骨高突如龜此先天不足督脈為病補天大造丸加金毛狗脊治之此外諸症治法與方脈同故不贅敘兒科列方三黃湯黃芩黃柏川黃連大黃各一錢濃煎將絲綿作乳頭狀蘸藥時時令吮每日五六回不必盡劑益黃散陳皮一錢青皮訶子肉炙草各五分丁香三分荊防散荊芥一錢防風蘇梗川芎陳皮各八分杏仁二錢甘草姜皮各三分保和丸山楂炭茯苓萊蔔子各一錢五分神麯半夏陳皮連翹各一錢和中丸白朮二兩扁豆茯苓砂仁半夏各一兩枳實神麯炒麥芽楂炭香附丹參各一兩五錢陳皮五穀蟲各二兩共為末每服三錢貝母栝蔞散川貝二錢栝蔞仁一錢五分山梔黃芩橘紅各一錢甘草五分熱甚加川連八分痰多加膽星五分黃芩芍藥湯黃芩白芍各二錢生甘草一錢蒿皮四物湯生地三錢北沙參炙鱉甲各二錢歸身白芍青蒿各一錢地骨皮一錢五分丹皮八分甘草五分四君子湯人參茯苓各一錢白朮一錢五分炙甘草五分大棗三枚通關散細辛皂角各三錢生半夏二錢共研末吹入鼻孔取嚏利火降痰湯黃連八分連翹一錢五分山梔滑石各二錢木通黃芩枳實栝蔞霜車前各一錢鉤藤四錢柴胡六分甘草三分清膈煎制膽星木通各一錢白芥子川貝各二錢海石三錢陳皮一錢五分抱龍丸膽星二錢天竺黃一錢五分雄黃辰砂各一錢麝香三分共為末糊丸燈心湯下清熱養血湯細生地三錢丹參一錢五分黑山梔青蒿丹皮各一錢赤芍八分生甘草五分異功散即前四君子湯加陳皮一錢附子理中湯人參白朮各二錢附子乾薑炙草各一錢七福飲人參熟地各三錢歸身棗仁各二錢白朮一錢五分炙草一錢遠志五分祕旨安神丸人參棗仁茯神半夏各二錢歸身白芍橘紅各一錢五分北五味炙草各五分生薑三片安神定志丸茯苓茯神人參龍齒各一錢遠志五分七味安神丸黃連當歸麥冬茯苓甘草各二錢硃砂三錢冰片二分共研末為丸燈心湯下一錢六味地黃湯熟地四錢山藥萸肉各二錢丹皮澤瀉茯苓各一錢五分藿香和中湯藿香八分厚朴砂仁陳皮炙草各五分生薑二片此方加蒼朮白芷蘇梗川芎香附楂炭麥芽治感寒停食導赤散生地二錢木通麥冬車前竹葉各一錢甘草三分加燈心三十寸虛者加人參五分花火膏燈花三顆煎湯香薷飲香薷扁豆厚朴各一錢五分炙草五分四苓散白朮一錢赤苓三錢木通豬苓各一錢車前澤瀉各一錢五分益元散滑石粉六錢生甘草一錢平胃散加減藿香厚朴各一錢五分蒼朮八分陳皮一錢二陳湯製半夏陳皮茯苓各一錢五分炙甘草五分生薑二片六君子湯即前四君子湯加半夏一錢五分陳皮一錢清中飲川連五分叉石斛生穀芽各三錢赤苓車前各二錢酒芩藿香各八分加薑汁炒竹茹一錢五分清熱湯鉤藤四錢山梔連翹青蒿各一錢五分殭蠶赤芍香薷各一錢滑石二錢川連柴胡各五分大和中飲炒麥芽楂炭各三錢枳實砂仁各六分陳皮厚朴澤瀉各一錢化蟲丸蕪荑雷丸各五錢檳榔本香白朮陳皮神麯各三錢雄黃一錢五分共為末糊丸使君子肉三錢煎湯送下三錢清熱導滯湯胡黃連五分地骨皮楂炭各二錢青蒿山梔大腹皮各一錢五分炒麥芽三錢檳榔厚朴丹皮生甘草各一錢加紅棗五枚理陰和中煎生地北沙參生穀芽各三錢地骨皮首烏青蒿子炒麥芽穭豆皮牡蠣各二錢白芍楂炭各一錢五分厚朴丹皮各一錢四物湯熟地四錢歸身白芍各一錢五分川芎一錢玉屏風散生黃耆二錢防風八分杏蘇煎杏仁二錢蘇梗前胡赤芍荊芥各一錢陳皮八分桔梗甘草各五分瀉白散桑白皮蜜炙一錢五分地骨皮二錢白虎湯生石膏四錢知母一錢五分粳米一撮甘草五分補天大造丸人參二兩黃耆白朮各三兩當歸棗仁山藥茯苓各一兩五錢熟地枸杞各四兩河車一具用鹿角一斤龜板八兩熬膏同為丸
