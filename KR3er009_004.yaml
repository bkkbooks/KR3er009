body:
  text: 卷四女科證治天台程鍾齡女科一卷悉從諸大家論説中斟酌盡善而出之字字毫髮無憾並無近世臨證指南等纖巧習氣故依治每收實功茲卷大半宗此以為女科正範此外諸症與方脈同治者概不贅敘婦女證論婦女之症不肯對人言與小兒之不能自言其難治一也醫家又未便逐細詢間則更暗中摸索矣然大要不離乎中情鬱結者近是蓋婦女陰嗇之性識見拘墟一有逆意即牢結胸中又不能散悶於外則鬱久而成病矣主治之法審無外感內傷別症唯有養血疏肝四字用四物湯逍遙散之類可以得其八九其一切雜症與方脈同治茲不贅敘若胎前産後此生死交關處詳敘於後慎勿忽諸室女室女天癸未至有病從幼科論天癸既行則與婦人同治矣然其神完氣足經水應無愆期其有時經閉者若非血海乾枯必其經脈逆轉血枯則內熱咳嗽漸成怯症經逆則為吐為衄血必妄行皆非輕候也須速治之如或經水適來偶阻溺竅則小便不通腹脹欲死急宜通其經而便自利用調經飲月經經者常也月行有常度經水有常期其愆乎常者皆病也方書以趲前為熱退後為寒此説亦難盡信要之察其色總以紅為正其變為紫黑者熱也黃如米泔者濕也淺淡紅白者虛也或成塊而紫黑色黯者寒凝也成塊而紫黑色明者熱結也將行而腹痛拒按者氣滯血凝也既行而腹痛喜按者氣虛血少也經前發熱者為血熱經後發熱者為血虛腹脹者為氣滯腹痛者為血滯泄瀉者是脾虛溏瀉者是寒濕凡逆行上溢而吐衄錯行下流而暴崩皆屬血熱妄行而亦有絡脈傷損瘀積肝旺所致若經水過多者色淡為虛色深為熱或兼赤白帶而下者臭者為濕熱腥者為寒濕血枯與經逆者並用益母勝金丹加牛膝主之經阻溺竅者調經飲並澤蘭湯主之經水紫黑者生地四物湯加丹參丹皮益母草淡紅者八珍湯主之黃如米泔者六君子湯加苡仁扁豆寒凝成塊者四物湯加桂心牛膝熱結成塊者生地四物湯加丹參丹皮益母草氣血凝滯而作痛脹者調經飲或四物湯加延胡香附木香氣虛血少而或痛或熱者四物湯加人參白朮泄瀉溏利者六君子湯主之血熱而上下妄行者四物湯加丹皮阿膠黃芩黑山梔絡脈傷而妄行者或喜怒或過勞八珍湯主之瘀血積則血不歸經獨聖丸主之肝火旺不能藏血者逍遙散主之其兼赤白帶者五苓散加減治之肝氣肝氣者婦女之本病婦女以血為主血足則盈而木氣盛血虧則熱而木氣亢木盛木亢皆易生怒故肝氣唯婦女為易動焉然怒氣泄則肝血必大傷怒氣鬱則肝血又暗損怒者血之賊也其結氣在本位者為左脅痛移邪於肺者右脅亦痛氣上逆者頭痛目痛胃脘痛氣旁散而下注者手足筋脈拘攣腹痛小腹痛瘰癧乳岩陰腫陰癢陰挺諸症其變病也不一隨症而治之左脅痛肝氣不和柴胡疏肝散若七情鬱結用逍遙散解恨煎右脅痛用推氣散如肝燥而皮泡脹痛者栝蔞散頭痛者痛或連眉稜骨眼眶逍遙散主之目痛者蒺藜湯加柴胡山梔胃脘痛者沉香降氣散柴胡疏肝散並主之手足筋脈拘攣者肝氣熱也五痿湯加黃芩丹皮腹痛者木乘土也芍藥甘草湯主之小腹痛者疝瘕之氣橘核丸主之瘰癧者血燥有火也消瘰丸散之兼服逍遙散乳岩者逍遙散歸脾湯二方間服陰腫陰癢陰挺諸症逍遙散主之甚則龍膽瀉肝湯帶下帶症有青黃赤白黑之分亦不必分屬五臟總之不外乎脾虛有濕而已用五味異功散加扁豆苡仁山藥澤瀉等無不愈者倘挾五色則加本臟藥一二味亦可若有熱加黃柏蓮心為得青色屬肝異功散加柴胡山梔黃色屬脾加石斛荷葉陳米赤色屬心加丹參當歸白色屬肺倍加苡仁黑色屬腎加杜仲續斷嗣孕求嗣之法別無他術只有實心待人廣行善事而已男子葆精女子調經詩曰婦人和平則樂有子男女有病或氣血不足隨症調理無不得子者至有孕之脈左寸心脈動甚為孕子之兆心主血心脈旺則血旺故知有子若兩尺脈旺與兩寸迥別亦為有子若流利雀啄亦為孕脈蓋經脈閉塞不行故脈疾而歇至此數月之胎也或謂兩寸皆浮大主生二男兩手皆沉實主生二女若經斷三月以川芎末煎艾湯空心服之腹內微動者即胎也葆精之道首宜寡欲次宜服藥真水虛而左尺無力者六味丸合五子丸或左歸丸真火衰而右尺無力者八味丸合五子丸或右歸丸兩尺俱無力者十補丸合五子丸精薄不凝者六味丸合五子丸加魚鰾鹿角膠之屬氣虛不能射遠者贊育丹主之調經之法見於月經篇血熱者益母勝金丹加生地丹皮血寒者益母勝金丹加肉桂氣滯腹痛者四物湯加延胡香附木香或調經飲氣虛者四物湯加人參白朮黃耆氣血並虛者育麟珠主之胎前諸症妊娠之月宜節欲食淡勿過勞亦勿過佚日常走動以活其胎屏絶嗔怒以靜其性自然易生易育兒亦聰明多壽矣然兒在腹中為時又久一切皆能致病備舉其症以示治法惡阻者濁氣閉塞中脘停痰眩暈嘔吐滿悶宜二陳湯加枳殼主之脾虛者六君子湯加蘇梗砂仁香附胎動不安者起居不慎也安胎飲主之胎漏者經水忽下血瀝盡則胎不保四物湯加防風黃芩主之如血虛加茯苓阿膠艾葉氣虛下陷者補中益氣湯子懸者胎上逼也紫蘇飲加減主之更有氣逆而厥暈者名曰子眩其症甚危亦用前藥如脾虛挾痰者六君子湯胎不長者産母宿疾所致五味異功散或八珍湯主之子煩者煩心悶亂也四六兩月居多火盛而煩淡竹葉湯若氣滯而悶宜二陳湯加白朮黃芩蘇梗枳殼子癇者血虛受風忽然口噤反張其症最暴受風者羚羊角散定之若怒動肝火者佐以逍遙散胎氣上逆者佐以紫蘇飲子鳴者小兒口中脫出胞乳腹內哭聲也須曲腰就地如拾物狀一二刻疙瘩仍入兒口即止用四物湯加白朮茯苓以安胎氣子喑者腎脈系舌本為胎氣壅閉故不能言不須服藥分娩後自能言矣小便不通者小腸有熱也四物湯加黃芩澤瀉主之然有胞胎墜壓胞系繚亂點滴不通者名曰轉胞其禍最速茯苓升麻湯主之或服補中益氣湯隨服而探吐之胎水腫滿者名曰子腫由胞胎壅遏水飲不流所致五皮飲加白朮茯苓主之脾虛不能制水者六君子湯乳自出者名曰乳泣生子多不育八珍湯補之熱病損胎者病熱而胎損腹中也古方用黑神散下之或平胃散加朴硝五錢下之更穩産母面赤舌青其子已損若面青舌赤母亦難全慎哉小産者未足月而欲生總因勞傷所致急用安胎飲以安之既産而腹痛拒按者瘀血也當歸澤蘭湯主之小産後血不止或煩渴面赤脈虛微者氣血大虛也八珍湯加炮薑補之若腹痛嘔瀉脾胃虛也香砂六君子湯加薑桂臨産將護法臨産之月一宜善養勿呆坐勿多睡勿飽食常食糜粥以解飢渴天熱則擇涼處天寒則擇暖室二宜選穩須預請老練穩婆備辦需用之物臨産時但用老婦二人撑扶不許多人喧鬧三宜服藥懷孕八月宜服保産無憂湯二三劑臨産時再服此劑撑開道路則兒易生如或連日不産用力太早宜服加味八珍湯以助其力人生人系天生人有自然之造化不假人力強為其有調護失宜而為逆産者則命在呼吸備列方法以保兩全凍産者天寒氣血凝滯難以速生須暖其室厚其衣服熱産者暑月過熱恐頭目昏眩而生血暈宜就涼處若水閣風雨更宜謹避橫生者兒方轉身用力太急也産母宜安然仰睡令老練穩婆先推兒身順直以中指探兒肩不令臍帶扳羈然後用脫花煎催之産母努力兒即順生倒産者兒未轉身努力太早手腳先出也令穩婆輕手推入若良久不生穩婆手入産戶就一邊撥轉兒頭服脫花煎偏産者兒已轉身母努力太急逼兒頭偏一邊雖露頂非也乃額角耳令穩婆輕手扶正其頭兒即下若兒頂後骨偏注穀道露額穩婆輕手於穀道外旁托正産母努力即生礙産者兒轉身時臍帶絆其肩以致不生穩婆輕手推兒向上以中指按兒肩脫去臍帶即生盤腸産者臨産子腸先出然後生子腸出時以潔淨漆器盛之用萆麻子四十九粒研爛塗産母頂腸即收急洗去其藥其腸若干以磨刀水少許溫潤之又有用麻油紙燃點燈吹熄以煙燻其鼻腸即上交骨不開有鎖骨者有血虛不能運達者令穩婆以麻油調滑石塗入産門或用兩指緩緩撑開服加味歸芎湯脫花煎産門不閉氣血虛也八珍湯補之如不應十全大補湯胞衣不下者因力乏不能努力宜用物系定再服歸芎湯即下或血入胞衣脹大不下心腹脹痛喘急急用清酒送失笑丸三錢其衣自下如不應花蕊石散牛膝散亦得産後諸症産後最宜將護一曰倚坐上床以被褥靠之暑月以橙靠之不可遽然睡倒須至十日後方可平睡常以手從心摩至臍下俾瘀露下行二曰擇食初生後宜專食粥半月後方可食打開雞蛋滿月後可食羊肉豬蹄等物三曰避風養神少言語大忌梳頭濯足恐招風濕四曰服藥初産畢即用生化湯或歸薑湯以驅瘀血自然安吉其有變生他症者隨症治之産後血暈者瘀血上攻胸腹脹痛拒按宜歸芎湯下失笑丸若去血過多心慌自汗用歸薑飲加人參甚則加熟附子産後不語者由心腎不交氣血虛弱所致七珍散歸脾湯並主之若虛火上炎六味地黃丸産後發熱者若無風寒表邪之象則血虛也四物湯加黑薑補之或加童便為引更效如有脾虛傷食用異功散加神麯麥芽大凡風寒發熱晝夜不退若血虛與傷食發熱則晡熱晨退然傷食更必吞酸噯腐滿悶以此為別更有氣血大虛陰躁作渴者乃陽隨陰散之危候十全大補湯救之狂言如見鬼神者有敗血上衝胸腹脹痛宜澤蘭湯並失笑丸若血虛神不守舍則心慌自汗宜安神定志丸加人參歸芎治之歸脾湯亦得心神驚悸者心血空虛也七福飲祕旨安神丸之類汗多變痙者陽氣大虛也十全大補湯主之産後身痛若遍身手按更痛者瘀血凝滯也四物湯加黑薑桃仁紅花澤蘭化之若身痛喜按者血虛也四物湯加黑薑參術補之若兼風寒必頭痛鼻塞惡寒宜古拜散加當歸川芎秦艽黑薑散之産後腰痛若上連脊背下連腿膝者風也獨活寄生湯主之若專腰痛者虛也八珍湯加杜仲續斷肉桂若惡露不盡痛如錐剌者速用桃仁湯化之免作癰腫産後心腹諸痛受風寒者口鼻氣冷停食者吞酸噯腐俱用二香散惟瘀血作痛若刀錐之刺失笑丸主之其中氣虛寒腹中冷痛得熱則止者理中湯加桂心若小腹痛處有塊不可手按者此名兒枕痛瘀滯也失笑丸主之惡露不絶者因肝氣不和用逍遙散因脾不統血用歸脾湯若因瘀滯而新血不得歸經必腹痛拒按歸芎湯下失笑丸蓐勞者寒熱食少頭脹肢痛最難調治八珍湯養之喘促者榮血暴竭衛氣無依最為難治六味地黃湯加人參若脾肺兩虛四君子湯加黑薑當歸若瘀血入肺口鼻起黑氣及鼻衄者此肺胃將絶之候急服參蘇飲如厥冷自汗更加附子間有得生者産後乳少由元氣虛弱八珍湯主之若乳房焮脹是未通也速宜吮通服王不留行湯若為兒口吹氣壅腫不通不急治即成乳癰速服栝蔞乳香散敷香附餅若兒飲不盡留乳作腫者亦如前法亦有鬱怒而乳腫者於栝蔞乳香散內加柴胡赤芍橘葉甘草乳癰初起由膽胃熱毒服栝蔞乳香散敷香附餅即消如已成膿則以神仙太乙膏貼之吸盡膿則愈矣乳岩初起內結小核不赤不痛漸大而潰形如熟榴內潰深洞此脾肺鬱結氣血虧損最為難治初起用加味逍遙散加味歸脾湯二方間服亦可內消及其病勢既成雖有盧扁亦難為力乳卸者乳頭拖下一二尺此肝經風熱發泄用小柴胡湯加羌防主之萆麻子四十九粒麝香一分研塗頂心俟乳頭收上即洗去女科列方益母勝金丹調經行血砂仁拌熟地酒蒸當歸酒蒸茺蔚子土炒上白朮酒炒香附各四兩酒炒白芍酒蒸丹參各三兩酒蒸川芎二兩五錢以益母草八兩酒水各半熬膏蜜丸開水下獨聖丸去瘀積五靈脂去土炒煙盡為末醋丸酒送下蒺藜湯治目赤腫痛白蒺藜一錢五分荊芥赤芍各一錢羌活防風各七分甘草五分加有須蔥白二段龍膽瀉肝湯治肝經濕熱龍膽草澤瀉各一錢車前子木通生地山梔酒炒當歸黃芩甘草各五分解恨煎治暴怒傷肝氣逆脹滿陳皮半夏厚朴茯苓各一錢五分蘇葉芍藥各一錢砂仁七分如脅肋脹痛加白芥子一錢如胸膈氣滯加枳殼香附藿香調經飲治經阻氣滯而作痛者當歸三錢牛膝山楂香附各二錢青皮茯苓各一錢五分五子丸此方同六味丸八味丸合成為種子之方枸杞子菟絲子各四兩五味子車前子覆盆子各二兩石斛六兩熬膏蜜丸開水下四錢贊育丹治男子精衰陽痿而艱子息熟地白朮各八兩當歸枸杞各六兩杜仲仙茅韭子巴戟肉山茱萸淫羊藿肉蓯蓉各四兩蛇床附子肉桂各二兩育麟珠治婦人氣血虛而經不調不孕者人參白朮茯苓芍藥川芎炙草杜仲鹿角霜川椒各二兩熟地當歸菟絲子各四兩蜜丸空心服安胎飲當歸川芎白芍熟地茯苓阿膠各一錢白朮三錢炙草艾葉各三分紫蘇飲當歸川芎紫蘇各一錢炙草人參白芍各五分大腹皮八分加薑一片蔥白一寸淡竹葉湯淡竹葉七片黃芩知母麥冬各一錢茯苓二錢羚羊角散羚羊角獨活當歸各二錢川芎茯神防風炙甘草各七分鉤藤三錢桑寄生二錢人參八分茯苓升麻湯治妊娠小便不通茯苓赤白各五錢升麻一錢五分當歸二錢川芎一錢苧根三錢或調琥珀末二錢服更佳黑神散隆冬寒月及體氣虛寒者用此桂心當歸芍藥炙草乾薑生地各一兩黑豆二兩附子炮去皮五錢當歸澤蘭湯當歸澤蘭酒芍川芎熟地一錢五分延胡索紅花香附丹皮各五分桃仁七粒保産無憂湯臨産日先服一二劑酒洗當歸一錢五分川貝一錢黃耆八分艾葉七分酒芍一錢二分菟絲子一錢四分薑汁炒厚朴七分荊芥八分枳殼六分川芎一錢三分羌活五分甘草五分薑三片加味八珍湯人參白朮各一錢茯苓八分當歸五錢炙草三分川芎一錢五分酒芍二錢熟地一錢五分乳香五分酒炒丹參三錢益母草二錢加味歸芎湯當歸五錢川芎三錢龜板童便炙三錢婦人頭髮一握燒灰存性脫花煎凡將産先服此藥催生最佳胎死腹中加朴硝三錢即下當歸八錢肉桂二錢川芎牛膝各二錢車前子一錢五分紅花一錢失笑丸治瘀血脹胞並治兒枕痛五靈脂去土炒蒲黃炒等分為末醋丸每服三錢酒下花蕊石散服此瘀血化水其人即蘇花蕊石一斤上色硫黃四兩為末和勻入瓦罐封固用炭煅二炷香取研童便酒下牛膝散治胎衣脹急緩則不救牛膝川芎炒蒲黃丹皮各一兩桂心四錢當歸一兩五錢共為末每服五錢水煎生化湯産後去瘀要藥當歸三錢黑薑五分川芎一錢五分益母草一錢桃仁七粒研歸薑湯産後心慌自汗當歸三錢黑薑七分炒棗仁一錢五分七珍散人參石菖蒲生地川芎各一兩防風辰砂各五錢細辛一錢為末薄荷湯調下古拜散産後受風諸症荊芥穗為末每服三錢生薑湯調下獨活寄生湯獨活桑寄生防風秦艽威靈仙牛膝茯苓各一錢桂心五分細辛炙草各三分當歸金毛狗脊各二錢桃仁湯桃仁十粒炒當歸三錢牛膝二錢澤蘭三錢蘇木一錢二香散散寒消食砂仁木香黑薑陳皮炙甘草各一兩香附三兩共為末參蘇飲人參一兩蘇木三錢王不留行煎王不留行一錢五分通草一錢赤芍一錢五分蔥白頭五個炒麥芽三錢栝蔞乳香散栝蔞一個明乳香二錢酒煎服香附餅香附一兩麝香二分共研勻以蒲公英二兩酒調藥敷之神仙太乙膏治一切癰疽元參白芷當歸肉桂生地赤芍大黃各一兩黃丹十三兩炒篩用麻油二斤熬藥去渣成珠入黃丹再熬為膏四物湯逍遙散澤蘭湯八珍湯六君子湯生地四物湯即四物湯去熟地用生地五苓散異功散六味丸即六味地黃湯二陳湯補中益氣湯五皮飲平胃散香砂六君子湯十全大補湯理中湯即附子理中湯小柴胡湯以上諸方俱見卷一柴胡疏肝散栝蔞散五痿湯芍藥甘草湯橘核丸消瘰丸以上諸方見肝部推氣散見肺部沉香降氣丸歸脾湯十補丸安神定志丸七福飲祕旨安神丸以上見心部左歸丸八味丸右歸丸以上見腎部
