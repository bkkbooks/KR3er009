body:
  text: 卷二臟腑證治心部手少陰屬臟心體屬火位南方色現赤胸下歧骨陷處其部位也凡額上手足心皆其所轄得血以養之方能運慧思用才智心無表症皆屬於里心之虛血不足也脈左寸必弱其症為驚悸為不得臥為健忘為虛痛為怔忡為遺精驚悸者惕惕然恐神失守也七福飲秘旨安神丸主之不得臥者思慮太過神不藏也歸脾湯安神定志丸主之健忘者心腎不交神明不充也歸脾湯十補丸主之虛痛者似𩞄似飢似手摭心喜得手按洋參麥冬湯主之怔忡者氣自下逆心悸不安歸脾湯主之遺精者或有夢或無夢心腎不固也清心丸十補丸主之心之實邪入之也心不受邪其受者胞絡耳脈左寸必弦而大其症為氣滯為血痛為停飲為痰迷為暑閉為蟲齧氣滯者或食脹或怒沖煩悶而痛沉香降氣散主之血痛者血凝於中痛有定處轉側若刀針刺手拈散主之停飲者乾嘔吐涎痛作水聲小半夏加茯苓湯主之如有飲囊則加蒼朮名倒倉法痰迷者頑痰壅閉不省人事清膈煎灌之暑閉者汗喘昏悶先以消暑丸灌之再用香薷飲加益元散蟲齧者飢時作痛面白唇紅化蟲丸主之心之寒脈左寸必遲其症為暴痛暴痛者肢冷氣冷綿綿不休姜附湯加肉桂主之心之熱火迫之也脈左寸必數舌尖赤其症為目痛為重舌木舌為煩躁為不得臥為癲狂為譫語為赤濁為尿血目痛者赤腫羞明導赤散加連翹菊花蟬蛻主之重舌木舌者瀉心丸主之煩躁者瀉心丸加竹捲心主之不得臥者暑熱乘心也導赤散加益元散主之癲狂者棄衣罵詈生鐵落飲主之譫語者邪熱攻心也瀉心丸主之赤濁者萆薢分清飲加燈心丹參主之尿血者阿膠散主之心部藥隊補心猛將北五味次將棗仁柏子仁遠志丹參龍眼麥冬當歸白芍茯神瀉心猛將石菖蒲黃連木通硃砂犀角次將山梔仁連翹心通草車前子竹捲心燈心蓮子心心部列方七福飲治心血虛而驚悸者人參熟地各三錢當歸棗仁各二錢白朮炒一錢五分炙甘草一錢遠志五分秘旨安神丸治驚悸神魂失守者人參棗仁茯神製半夏各二錢當歸炒白芍橘紅各一錢五分五味子十粒炙草五分生薑三片歸脾湯養血安神人參白朮當歸白芍棗仁各一錢五分黃耆一錢半遠志七分炙草五分龍眼肉五枚安神定志丸治心惕不臥茯苓茯神人參遠志各一兩石菖蒲龍齒各五錢煉蜜為丸以辰砂為衣每服二錢十補丸治氣血大虧之症黃耆白朮萸肉杜仲續斷棗仁各一兩大熟地三兩人參當歸白芍遠志各一兩茯苓山藥各一兩五錢北五味龍骨牡蠣各七錢五分洋參麥冬湯治心經虛熱而痛者洋參麥冬當歸各二錢生地三錢白芍丹參釵石斛各一錢五分犀角甘草各五分清心丸清心火止夢泄生地四兩丹參二兩黃柏五錢牡蠣山藥炒棗仁茯苓茯神麥冬各一兩五錢北五味車前子遠志各一兩用金櫻膏為丸每服三錢沉香降氣散治氣滯心痛沉香三錢砂仁七錢炙草五錢鹽水炒香附五兩酒炒元胡索一兩煨淨川楝子一兩共為末每服二錢淡薑湯下清膈煎治痰壅心膈制膽星一錢白芥子二錢海石三錢陳皮木通川貝各一錢化蟲丸治蟲積心腹諸痛蕪荑白雷丸各五錢檳榔二錢五分雄黃一錢五分木香白朮陳皮各三錢炒神麯四錢以百部二兩熬膏糊丸每服一錢五分米飲下姜附湯治寒厥心痛又真心痛手足青至節宜用本方大劑飲之或救十中之一二痛而喜按者更加人參乾薑熟附子各三錢水煎服導赤散治熱閉小便不通麥冬三錢木通一錢生地三錢甘草四分竹葉十片車前赤茯苓各一錢五分瀉心丸治心火川黃連五錢為末燈草湯下生鐵落飲治心熱天冬麥冬川貝各三錢膽星橘紅各一錢遠志石菖蒲連翹茯苓茯神各一錢元參鉤藤甘參各一錢五分辰砂三分用生鐵落煎熬三炷線香取此水煎服萆薢分清飲治心移熱膀胱而為赤濁者並治諸淋川萆薢二錢炒黃柏石菖蒲各五分茯苓白朮各一錢蓮子心七分丹參車前子各一錢五分阿膠散治尿血阿膠一錢丹參生地各二錢黑山梔血餘丹皮麥冬當歸各八分手拈散小半夏加茯苓湯消暑丸香薷飲益元散以上諸方俱見卷一肝部足厥陰屬臟肝與膽相附東方木也其性剛賴血以養自兩脅以下及少腹陰囊之地皆其部位最易動氣作痛其風又能上至巔頂而痛於頭色屬青常現於左顴目眥於婦人為尤甚肝無表症皆屬於里肝之虛腎水不能涵木而血少也脈左關必弱或空大其症為脅痛為頭眩為目干為眉稜骨眼眶痛為心悸為口渴為煩躁發熱脅痛者血不營筋也四物湯主之頭眩者血虛風動也逍遙散主之目乾者水不養木也六味地黃丸主之眉稜骨眼眶痛者肝血虛見光則痛逍遙散主之心悸者血少而虛火煽也七福飲主之口渴者血虛液燥也甘露飲主之煩躁發熱者虛火亢也六味地黃丸主之肝之實氣與內風充之也脈左關必弦而洪其症為左脅痛為頭痛為腹痛為小腹痛為積聚為疝氣為咳嗽為泄瀉為嘔吐為呃逆左脅痛肝氣不和也柴胡疏肝散栝蔞散並主之頭痛者風熱也清空膏主之或柴胡疏肝散腹痛者肝木乘脾也芍藥甘草湯主之小腹痛者癥瘕之氣聚也奔豚丸主之有熱者去附桂積聚者肝積在左脅下名曰肥氣和中丸加柴胡鱉甲青皮莪朮主之疝氣者氣結聚於下也橘核丸主之寒則加吳茱萸肉桂咳嗽者木火刑金也止嗽散加柴胡枳殼赤芍主之泄瀉者木旺剋土也四君子湯加柴胡木香主之嘔吐者木火凌胃也二陳湯加炒黃連主之呃逆者氣鬱火沖也橘皮竹茹湯主之肝寒之症脈左關必沉遲其症為小腹痛為疝瘕為囊縮為寒熱往來小腹痛者寒結下焦也暖肝煎奔豚丸主之疝瘕者寒氣結聚也橘核丸加吳茱萸肉桂主之囊縮者寒主斂故縮也奔豚丸四逆湯主之寒熱往來者欲化瘧也小柴胡湯主之肝熱之症脈左關必弦數其症為眩暈為目赤腫痛為口苦為消渴為頭痛為脅痛為瘰癧為聤耳為筋痿拘攣為氣上衝心為偏墜為舌卷囊縮為小便不禁眩暈者風熱上升也逍遙散主之目赤腫痛者風熱入目也蟬花無比散主之口苦者膽味苦肝熱膽亦熱也小柴胡湯主之消渴者風燥其液也一柴胡飲主之頭痛者火上衝也柴芩煎主之脅痛者肝火鬱也柴胡疏肝散加栝蔞霜主之左金丸亦可瘰癧者血燥筋急而生也消瘰丸主之兼服逍遙散聤耳者風熱相搏津液凝聚而癢痛也逍遙散去白朮加荷葉木耳貝母香附菖蒲主之筋痿拘攣者血氣熱也五痿湯加黃芩丹皮牛膝主之氣上衝心者火逆也柴芩煎主之甚則小承氣湯偏墜者熱而睪丸舒縱也柴胡疏肝散主之舌卷囊縮者邪入厥陰血涸也大承氣湯主之小便不禁者肝氣熱陰挺失職也逍遙散主之肝部藥隊補肝猛將枸杞北五味烏梅次將山茱萸菟絲子首烏當歸白芍沙苑蒺藜鱉甲龍骨牡蠣木瓜瀉肝猛將鬱金桃仁青皮莪朮沉香次將香附木香延胡索柴胡山梔川芎川楝子赤芍藥栝蔞殼白蒺藜陳佛手鉤藤涼肝猛將龍膽草胡黃連次將羚羊角夏枯草石決明青蒿菊花溫肝猛將肉桂桂枝吳茱萸細辛胡椒骨碎補次將菟絲子艾葉山茱萸茴香肝部列方甘露飲治血虛胃熱枇杷葉生地熟地天冬麥冬黃芩石斛各一錢甘草五分枳殼八分柴胡疏肝散治肝氣左脅痛柴胡陳皮各一錢二分川芎赤芍枳殼醋炒香附各一錢炙草五分栝蔞散治肝氣燥急而脅痛大栝蔞一枚連皮搗甘草二錢紅花七分水煎服清空膏治肝經風熱入升為頭痛羌活防風各六分柴胡五分黃芩一錢二分川芎四分炙草一錢薄荷三分酒炒黃連六分芍藥甘草湯治木侮土而腹痛酒炒白芍三錢炙甘草一錢五分奔豚丸治小腹氣結作痛川楝子一兩茯苓橘核各一兩五錢肉桂三錢附子吳茱萸各五錢荔枝核八錢小茴香木香各七錢橘核丸通治七疝鹽酒炒橘核二錢小茴香川楝子桃仁醋炒香附山楂各一兩木香紅花各五錢以神麯三兩打糊為丸二陳湯治胃經寒痰半夏茯苓陳皮各一錢炙草五分生薑二斤大棗二枚橘皮竹茹湯治氣鬱火沖呃逆陳皮二錢竹茹一團半夏人參甘草各一錢暖肝煎治肝腎陰寒小腹疼痛疝氣當歸枸杞各三錢茯苓小茴香烏藥各二錢肉桂沉香各一錢加姜三斤蟬花無比散治目赤腫痛蟬蛻二兩羌活一兩川芎石決明防風茯苓赤芍各一兩五錢白蒺藜八兩炙甘草當歸各三兩米泔浸蒼朮一兩為末開水服一柴胡飲治外有邪而內有火及肝燥胃渴生地三錢白芍二錢黃芩一錢五分柴胡陳皮各八分甘草五分柴芩煎治內火上衝或為痢瘧頭痛諸症柴胡二錢黃芩梔子澤瀉各一錢五分木通枳殼各一錢左金丸治肝氣痛川黃連一錢吳茱萸七分消瘰丸治瘰癧初起即散久服亦消蒸元參醋煅牡蠣蒸川貝母各四兩蜜為丸每服三錢五痿湯治五臟受熱而痿人參白朮茯苓各一錢炙草四分當歸一錢五分苡仁三錢麥冬二錢黃柏知母各五分四物湯逍遙散六味地黃湯和中丸止嗽散四君子湯小柴胡湯四逆湯大承氣湯小承氣湯以上諸方俱見卷一七福飲見心部方脾部足太陰屬臟脾屬土中央黃色後天之木也下受命門之火以蒸化穀食上輸穀食之液以灌溉臟腑故人生存活之原獨脾土之功為最大然其性喜燥而惡濕一受濕漬則土力衰而肝木即乘以侮之位中焦眼胞鼻準及四肢皆其分野與胃相表裡故其藥略同脾無表症皆屬於里脾虛者右關脈必細軟其症為嘔吐為泄瀉為久痢為腹痛為肢軟為面黃為發腫為肌瘦為鼓脹為惡寒為自汗為喘為積滯不消為飲食化痰為脫肛為腸血嘔吐者中空也六君子湯加煨姜主之泄瀉者土不勝濕也五味異功散加木香主之久痢者氣虛下陷也補中益氣湯主之腹痛者肝木乘脾也芍藥甘草湯加木香主之肢軟者脾屬四肢也五味異功散主之面黃者本色虛現也六君子湯主之發腫者皮不亮手按成窟補中益氣湯去升柴主之肌瘦者脾主肌肉也十全大補湯主之鼓脹者中空無物氣虛也六君子湯主之惡寒者陽虛不達於表也附子理中湯主之自汗者脾主肌肉表虛不攝也五味異功散加黃耆五味主之喘者土不生金也五味異功散加北五味牛膝主之積滯不消者化谷無力也六君子湯加穀芽砂仁肉桂主之飲食化痰者土不勝濕也六君子湯主之脫肛者氣虛下陷也補中益氣湯主之腸血者脾不統血也歸芍六君子湯主之脾實者右關必洪實其症為氣積為血積為食積為痞積為蟲積為痰飲為蠱脹為腹痛為不能食氣積者氣鬱發悶也沉香降氣丸主之血積者蓄血作痛如刺有定處也澤蘭湯主之食積者堅滯脹滿也大和中飲主之痞積者血滯成痞癥瘕痃癖可按也太無神功散和中丸主之蟲積者濕熱所化也唇內有白點化蟲丸主之痰飲者或停心下伏兩脅有聲咳則痛小半夏加茯苓湯主之蠱脹者中實有物非蠱即血也和中丸主之腹痛者中有滯也香砂二陳湯加山楂麥芽厚朴主之不能食者食未消也保和丸主之脾寒之症右關必沉遲唇舌必白其症為嘔吐為泄瀉為白痢為腹痛為身痛為黃疸為濕腫為肢冷為厥脫嘔吐者食不消而反胃也平胃散主之泄瀉者土失職也六君子湯加炮姜主之白痢者積寒傷氣也六君子湯加木香主之腹痛者綿綿不減香砂理中湯主之如挾食拒按木香丸身痛者拘急為風重墜為濕風用香蘇散濕用蒼白二陳湯黃疸者土為濕制有陰寒之象熏黃色黯茵陳五苓散濕腫者不煩渴喜熱五苓散主之肢冷者陽氣不營於四末也附子理中湯主之厥脫者氣衰火息也附子理中湯加大劑人參主之脾熱之症右關必數舌苔薄而黃唇赤其症為熱吐為流涎為洞泄為瀉渤為赤痢為腹痛為目胞腫痛為酒疸為眩暈為陽黃疸熱吐者食不得入也橘皮竹茹湯加薑汁炒黃連主之流涎者睡中出沫脾熱蒸濕也黃芩芍藥湯主之洞泄者暑濕勝土一泄如注也四苓散加益元散主之瀉渤者暑濕內搏利如蟹渤將變痢也黃芩芍藥湯主之赤痢者暑熱傷血也治痢奇方主之或葛根治痢散噤則開噤散腹痛者乍作乍止芍藥甘草湯加黃連清之目胞腫痛者火上升也柴芩煎主之酒疸者酒濕積而為疸也加味枳朮湯加茵陳葛根主之眩暈者酒濕生熱上蒸也葛花清脾湯主之陽黃疸者黃如橘皮有光目溺皆黃梔子柏皮湯主之如便閉茵陳大黃湯脾部藥隊補脾猛將白朮黃精次將山藥扁豆苡仁大棗炙甘草瀉脾猛將枳實萊菔子次將神麯麥芽山楂枳殼厚朴大腹皮使君子白芷雞內金陳皮檳榔涼脾猛將大黃黃芩栝蔞霜次將黃柏山梔知母銀花武夷茶溫脾猛將附子乾薑巴豆肉豆蔻草果蒼朮胡椒次將木香煨薑烏藥藿香益智仁砂仁白蔻仁蕪荑焦穀芽川椒脾部列方歸芍六君子湯治脾陰虛弱下血歸身白芍各二錢人參白朮茯苓各一錢五分陳皮半夏各一錢炙草五分大和中飲治食積脹悶枳實一錢厚朴一錢五分麥芽楂炭各二錢陳皮一錢砂仁八分澤瀉一錢太無神功散治一切痞積地萹蓄瞿麥穗麥芽各五錢神麯二錢五分沉香木香各一錢五分炙草五錢酒蒸大黃二兩共為末每服二三錢燈心竹葉湯下女人紅花當歸湯香砂二陳湯治脾滯腹痛木香一錢砂仁一錢製半夏陳皮茯苓炙草各一錢五分加生薑一片大棗二枚蒼白二陳湯治受濕身痛即前方去木香砂仁加蒼朮白朮各一錢保和丸治傷食麥芽山楂萊菔子厚朴香附各一錢炙草連翹各五分陳皮一錢五分水煎服亦可香砂理中湯治脾寒腹痛木香一錢砂仁一錢人參白朮各二錢乾薑炙草各一錢木香丸治寒積腹痛拒按名曰陰結木香丁香各一錢五分乾薑三錢炒麥芽五錢陳皮三錢巴豆三十粒以神麯煮糊為丸每服十丸黃芩芍藥湯治脾熱流涎利如蟹渤等症黃芩白芍各二錢生甘草一錢四苓散治伏暑泄瀉白朮豬苓木通各一錢赤苓三錢車前澤瀉各二錢水煎用益元散三錢沖服加味枳朮湯治酒疸濕熱發黃白朮二錢枳實陳皮麥芽山楂茯苓神麯連翹各一錢茵陳荷葉各一錢五分澤瀉五分如傷酒加葛根一錢葛花清脾湯治酒濕生熱生痰頭眩頭痛葛花一錢枳椇子三錢赤苓三錢澤瀉茵陳酒芩各二錢山梔車前子各一錢五分甘草五分橘紅厚朴各一錢梔子柏皮湯治鬱熱在裡而發黃疸名曰陽黃梔子三錢黃柏二錢炙草一錢六君子湯五味異功散補中益氣湯十全大補湯附子理中湯澤蘭湯和中丸小半夏加茯苓湯平胃散香蘇散五苓散茵陳五苓散益元散葛根治痢散治痢奇方開噤散以上諸方俱見卷一沉香降氣丸化蟲丸二方見心部芍藥甘草湯橘皮竹茹湯柴芩煎三方見肝部肺部手太陰屬臟肺主氣屬西方而色白其形如華蓋為諸陽之首凡聲之出入氣之呼吸自肺司之其性嬌嫩故與火為仇其體屬金而畏燥故遇寒亦咳凡目白及右頰鼻孔皆其分野然肺氣之衰旺關乎壽命之短長全恃腎水充足不使虛火爍金則長保清寧之體而壽臻永固肺有里症亦有表症肺主皮毛故也邪在表右寸脈必浮其症為發熱為噴嚏鼻塞為咳為嗽為畏風為胸滿痛為喉疼為鼻燥為傷暑風為中時疫發熱者腠理閉也香蘇散主之噴嚏鼻塞者肺竅受邪也二陳湯加蘇葉生薑主之咳者無痰而有聲氣為邪遏也桔梗前胡湯主之嗽者有聲而有痰液已化痰也止嗽散主之喘者風寒閉塞也加味甘桔湯主之畏風者邪在皮毛也香蘇散主之胸滿痛者氣鬱而脹也加味甘桔湯主之喉疼者邪化火而內焰也加味甘桔湯主之鼻燥者邪化火而液干也貝母栝蔞散主之傷暑風者惡寒頭痛而煩渴香薷飲加荊芥秦艽主之中時疫者初頭痛發熱漸嘔惡胸滿或脹悶譫狂唇焦口渴先用香蘇散次則神朮散又治疫清涼散便閉加大黃肺虛之症右寸脈必細其症為自汗為咳嗽為氣急為咯血為肺痿為虛勞自汗者氣虛表不固也八珍湯加黃耆北五味麥冬主之咳嗽者肺虛不寧也五味異功散主之氣急者金不生水而虛火上炎也知柏八味丸主之咯血者陰虛動火也初用四生丸兼用生地黃湯肺痿者火刑金而葉焦也五痿湯加天冬百合主之或紫菀散人參燕窩百合湯亦可虛勞者吐血而成月華九歸脾湯六味地黃湯並主之肺實之症脈右寸必有力其症為氣閉為痰閉為暑閉為水閉發喘為風閉為火閉為咽痛為右脅痛為肺癰氣閉者氣壅塞其絡而滿悶也加味甘桔湯主之痰閉者頑痰壅塞也清膈煎主之暑閉者暑邪中肺而煩渴也消暑丸加香薷木通主之水閉發喘者胃經蓄水作腫而浸肺也五皮飲主之風閉者風鬱於肺而哮嗽也麻黃湯主之火閉者火鬱於肺而喘脹也白虎湯加桑皮葶藶主之咽痛者諸閉皆能作火也加味甘桔湯主之右脅痛者肝移邪於肺也推氣散主之肺癰者隱隱而痛吐痰腥臭也桔梗湯主之肺寒之症外感居多脈右寸必遲其症為清涕為咳嗽為惡寒為面色痿白清涕者寒搏其液也二陳湯加蘇梗主之咳嗽者金畏寒也止嗽散主之惡寒者陰忌其類也香蘇散主之面色痿白者寒傷正氣也六君子湯主之肺熱之症脈右寸必數其症為目赤為鼻衄為咽痛為吐血為咳嗽濃痰為酒積為龜胸為小便不利為便血目赤者火剋金也瀉白散加黃芩菊花連翹主之鼻衄者血熱妄行也茜根湯主之咽痛者火逼咽道也加味甘桔湯主之吐血者火動其血也四生散犀角地黃湯主之咳嗽濃痰者火刑金而灼肺液也黃芩知母湯主之酒積者鼻赤鼻瘡濕熱內蒸也黃芩清肺飲加葛花主之龜胸者肺熱而脹也白虎湯主之小便不利者火鑠金而化源窒也黃芩清肺飲加鹽豉主之便血者肺與大腸相表裡火迫血行也芍藥甘草湯加黃芩丹皮生地主之肺部藥隊補肺猛將黃耆人參次將黨參沙參百合燕窩阿膠懷山藥訶子麥冬冰糖瀉肺猛將葶藶麻黃白芥子桔梗升麻膽星次將蘇子牛蒡杏仁前胡紫菀桑白皮殭蠶竹茹貝母涼肺猛將石膏黃芩竹瀝馬兜鈴山慈菇次將洋參元參山梔花粉天冬地骨皮知母麥冬薄荷海石溫肺猛將麻黃天南星北五味次將蘇梗款冬花制牛夏生薑煙肺部列方桔梗前胡湯治肺氣閉塞悶咳桔梗一錢前胡蘇子赤芍桑白皮蜜炙陳皮各一錢五分杏仁三錢薑汁炒竹茹一錢生甘草五分加味甘桔湯治肺郁哮喘等症甘草五分桔梗川貝百部白前橘紅旋覆花茯苓各一錢五分貝母栝蔞散治肺熱液干貝母二錢栝蔞仁一錢五分膽星黑山梔各五分黃芩橘紅炒黃連各一錢甘草五分知柏八味丸滋水降火知母黃柏各一錢五分大熟地四錢萸肉山藥茯苓各一錢五分丹皮澤瀉各一錢紫菀散潤肺止嗽並治肺痿人參五分紫菀知母川貝桔梗茯苓阿膠各一錢五味子炙草各三分人參燕窩百合湯潤肺清金人參一錢如無力以洋參沙參二三錢代之燕窩三錢百合五錢共燉爛食之推氣散治右脅氣痛枳殼鬱金各一錢桂心炙草各五分桔梗陳皮各八分生薑二片大棗二枚桔梗湯治肺癰桔梗白芨橘紅炒甜葶藶各八分甘草貝母各一錢五分苡仁金銀花各五錢瀉白散治肺熱蜜炙桑白皮二錢地骨皮三錢茜根湯治衄血神煩茜根黃芩阿膠側柏葉生地各二錢甘草一錢犀角地黃湯治血熱妄行及癍疹犀角尖鎊先煎丹皮麥冬白芍各一錢五分生地四錢黃芩知母湯治火嗽煩熱黃芩知母桑白皮杏仁天花粉山梔川貝桔梗生甘草各一錢黃芩清肺飲治肺熱小便不利梔子二錢黃芩一錢香蘇散止嗽散香薷飲神朮散八珍湯治疫清涼散五味異功散生地黃湯月華丸六味地黃湯消暑丸五皮飲麻黃湯六君子湯四生丸白虎湯以上諸方俱見卷一歸脾湯清膈煎二方見心部二陳湯五痿湯芍藥甘草湯三方見肝部腎部足少陰屬臟腎者天一之水先天之本也位北方故黑其體常虛處腰左右介其中者有命門火蒸化穀食名曰真陽腎水充足自多誕育享大壽凡夙夜宣勞耄而不倦者皆腎氣之固也好色之流先竭腎水喪其本矣瞳神下頦兩腰皆其部位望氣者覘之腎無表症皆屬於里腎之虛脈左右尺常細軟其症為頭痛為耳鳴為耳聾為盜汗為夜熱為健忘為咳嗽為喘為吐血為腰痛為腿痠足軟為目視無光為大便結為小便不禁為戴陽為久痢久瘧頭痛者血不能充髓海也六味地黃丸主之耳鳴者血虛火旺也六味地黃丸加牛膝知母主之耳聾者虛閉也六味地黃丸加枸杞人參石菖蒲遠志主之盜汗者虛熱也生地黃煎八珍湯加黃耆北五味並主之夜熱者虛火也四物湯加丹皮地骨青蒿主之健忘者心腎不交也歸脾湯十補丸主之咳嗽者虛火鑠金也六味地黃丸加白蜜胡桃主之喘者水虧火炎也知柏八味丸主之吐血者血虛血熱也生地黃湯主之腰痛者水不足也六味地黃丸加杜仲川續斷主之腿痠足軟者血不營筋也十全大補湯主之目視無光者水不足也六味地黃丸主之大便結者血虛液枯也六味地黃丸加白蜜胡桃主之小便不禁者腎氣不約也十補湯主之戴陽者陰火上亢陰躁似陽躁也金匱腎氣丸主之久痢久瘧者脾腎皆虛也王母桃主之腎無實症腎之寒腎之虛也脈左右尺必遲沉其症為命門火衰為不欲食為雞鳴泄瀉為天柱骨倒為蜷臥厥冷為奔豚命門火衰者虛象百出左歸飲右歸飲主之不欲飲食者火力微也八味地黃丸主之雞鳴泄瀉者腎虛也加味七神丸主之天柱骨倒者督脈空也右歸飲主之蜷臥厥冷者火衰也右歸飲理中湯並主之奔豚者腎氣上衝也奔豚丸主之腎之熱水將涸也傷寒門有之而雜症罕見左尺右尺必沉數或浮而空舌黑無液其症為口燥咽乾為目不明為小便不利為小便濁為小便出血為大便秘口燥咽乾者水涸也大承氣湯主之目不明者目無血養也知柏八味丸主之小便不利者水少也滋腎丸主之小便濁者濕熱結於下焦也萆薢分清飲主之小便出血者腎水熱也生地黃湯主之大便秘者液涸也大承氣湯主之腎部藥隊補腎猛將熟地枸杞淫羊藿北五味次將生地巴戟天首烏杜仲龜板女貞穭豆皮海參瀉腎猛將豬苓次將澤瀉知母赤苓苡仁涼腎猛將朴硝元明粉苦參次將生地丹皮知母滑石溫腎猛將破故紙鹿茸鹿角膠次將山茱萸菟絲子大茴香艾葉腎部列方生地黃煎治陰火盜汗生地當歸炙黃耆麻黃根浮小麥炙草黃連黃芩黃柏各一錢水煎服王母桃培補脾腎炒冬白朮大熟地各二兩何首烏炒巴戟枸杞子各一兩共為細末煉蜜為丸如圓眼大每用三四丸飢時服左歸飲壯水之劑熟地五錢山藥枸杞各二錢茯苓一錢五分山茱萸炙草各一錢右歸飲補命門真火不足熟地五錢山藥枸杞杜仲各二錢山茱萸肉桂製附子炙甘草各一錢八味地黃丸治命門火衰製附子肉桂各一錢大熟地四錢山藥萸肉茯苓各一錢五分丹皮澤瀉各一錢加味七神丸治腎虛雞鳴泄瀉肉豆蔻吳茱萸廣木香各一兩蒸茯苓補骨脂鹽酒炒車前子蒸各二兩土炒白朮四兩大棗煎湯為丸每服三錢滋腎丸治下焦血熱用此滋陰化氣黃柏知母各二兩肉桂一錢煉蜜為小丸六味地黃湯八珍湯四物湯十全大補湯歸脾湯生地黃湯金匱腎氣丸理中湯大承氣湯以上諸方俱見卷一十補丸萆薢分清飲二方見心部奔豚丸見肝部知柏八味丸見肺部胃部足陽明屬腑胃屬中土司受化穀食經云得谷者昌失谷則亡其能受與否生死系焉其性與脾同而畏木侮舌之中及牙床並環唇口而交人中皆其分野色現黃胃為陽明有經有腑故有表症右關脈必浮傷寒邪入陽明經其症為目痛鼻乾唇焦嗽水不欲咽若他表症為面浮腫而痛為癍疹目痛鼻乾唇焦者邪熱作火也葛根湯主之面浮腫而痛者風也葛根湯主之癍疹者邪熱所化也葛根湯加牛蒡子主之胃之虛其唇必白脈右關必軟弱其症為吐為噎膈為不能食為胃脘痛為停滯為濕腫為痰為嘈雜吐者土虛木侮也香砂六君子湯加柴胡主之噎膈者胃脘乾槁也上脘槁能飲水而食難進下脘槁食可入而久復出啟膈散主之佐以四君子湯有鬱則逍遙散不能食者胃氣虛而難受也六君子湯主之胃脘痛者心悸怔忡喜按歸脾湯或四君子加柴胡木香停滯者土虛不化也枳朮丸主之濕腫者土不勝濕也香砂六君子湯主之痰者土衰濕化也六君子湯主之嘈雜者躁擾不寧得食暫已氣促食少中虛挾痰也五味異功散主之胃之實脈右關必洪按胸則痛其症為結胸為痞氣為食積為痰飲為水腫為胸脹悶為胸脹痛為胸痛嘔膿為不得臥為便閉譫語發狂結胸者傷寒下早邪熱結聚也大小陷胸湯主之痞氣者脾之積在胃脘腹大如盤和中丸加厚朴主之食積者脹痛拒按也保和丸主之痰飲者咳則痛轉側有聲小半夏加茯苓湯主之外臺茯苓飲尤效水腫者先腫後喘或腫而不喘胃經蓄水也五皮飲主之甚則金匱腎氣丸胸脹悶者積滯也保和丸主之胸脹痛者蓄血也澤蘭湯主之胸痛嘔膿者胃脘癰也不必治而自愈不得臥者胃不和則臥不安也二陳湯加砂仁主之便閉譫語發狂者胃有燥矢也大承氣湯主之胃之寒唇舌必白脈右關必沉遲其症為胃脘痛為嘔吐為霍亂為吞酸噯腐胃脘痛者肢冷氣冷綿綿不休姜附湯加肉桂主之如吐蛔加川椒烏梅川連焦朮川楝嘔吐者食入復出也平胃散加煨薑砂仁主之霍亂者寒濕傷胃也和胃飲主之吞酸噯腐者寒不消食也香砂二陳湯主之胃之熱唇舌紅口臭脈右關必洪數其症為三消為嘈雜為吐血為齒痛為黃胖面腫為自汗為舌黑燥渴為癍疹為便閉為呃逆為頭痛三消者燥熱結聚也口渴消水為上消二冬湯主之消穀易飢為中消生地八物湯主之口渴小便如膏為下消六味地黃湯加生脈散主之嘈雜者煩擾不寧口燥唇焦痰火為患也二陳湯加山梔黃連主之吐血者胃火迫血妄行也白虎湯主之齒痛者陽明有餘少陰不足也玉女煎主之黃胖面腫者濕熱也和中丸主之自汗者熱而蒸溽也抽薪飲主之舌黑燥渴者胃火熾甚也白虎湯主之發癍疹者火鬱而化也初用葛根湯加牛蒡子以散之次用犀角大青湯加石膏或三黃解毒湯甚則白虎湯調胃承氣湯呃逆不止者胃火上衝也安胃飲主之頭痛者頭筋扛起胃火上衝也加味升麻湯主之胃部藥隊補胃猛將白朮黃耆大棗次將扁豆山藥炙甘草桂圓紅棗瀉胃猛將石菖蒲枳實雷丸白芥子萊菔子神麯次將蘇梗枳殼蔓荊子麥芽涼胃猛將石膏犀角次將花粉葛根香薷石斛萆薢知母蘆根竹葉溫胃猛將乾薑高良薑益智仁肉豆蔻草果丁香木香胡椒辛夷次將藿香砂仁白蔻仁半夏烏藥煨薑厚朴川椒胃部列方枳朮丸除脹消食炒枳實一兩炒白朮二兩大陷胸湯服小陷胸湯不效以此治之大黃六錢芒硝四錢甘遂二分五釐研沖小陷胸湯治結胸少腹滿痛手不可近半夏二錢黃連一錢五分栝蔞仁大者一個杵和胃飲治霍亂厚朴陳皮各二錢乾薑一錢炙草六分二冬湯治上消天冬二錢麥冬三錢花粉黃芩知母各一錢人參甘草各五分生地八物湯治中消生地麥冬各三錢山藥知母丹皮各一錢五分黃芩黃連黃柏各一錢荷葉二錢水煎服玉女煎治陽明有餘少陰不足熟地四錢石膏麥冬各三錢知母牛膝鹽水炒各一錢五分抽薪飲治一切火盛黃芩石斛木通梔子黃柏各二錢枳殼澤瀉各一錢五分甘草三分犀角大青湯治胃火發癍大渴大熱或咽痛不利犀角尖大青元參甘草升麻黃芩黃連黃柏人中黃黑山梔各一錢五分或加石膏一兩同煎三黃解毒湯治火毒內盛黃連二錢黃芩黃柏黑山梔各一錢五分安胃飲治胃火呃逆石斛麥芽各三錢黃芩澤瀉山楂各二錢陳皮木通各一錢知味升麻湯治胃火上衝頭痛甚熾升麻葛根赤芍甘草各一錢石膏三錢薄荷五分加燈心二十寸外臺茯苓飲即異功散加枳實二錢生薑三片用真人參葛根湯香砂六君子湯四君子湯逍遙散異功散六君子湯和中丸小半夏加茯苓湯五皮飲金匱腎氣丸澤蘭湯六味地黃丸大承氣湯平胃散白虎湯調胃承氣湯以上方見卷一歸脾湯姜附湯二方見心部二陳湯方見肝部保和丸香砂二陳湯二方見脾部膀胱部足太陽屬腑膀胱者州都之官津液藏焉氣化則能出矣然腎氣足則化腎氣不足則不化入氣不化則水歸大腸而為泄瀉出氣不化則閉塞下焦而為癃腫小便之利膀胱主之實腎氣主之也傷寒傳經之邪每自膀胱入一見太陽頭痛等症即宜發散不使邪氣入為諸經害則膀胱為第一關隘矣膀胱為太陽腑有表症左尺脈必浮其症為頭痛為項脊強為身痛四肢拘急為發熱為惡寒無汗為喘嗽頭痛者頭腦痛而連項脊也加味香蘇散主之甚者加羌活蔥白項脊強者太陽經所過之地也香蘇散主之身痛四肢拘急者風傷衛寒傷營寒主收引也桂枝湯主之發熱者腠理閉塞也香蘇散主之惡寒無汗者寒乘表也麻黃湯主之喘嗽者寒邪客於皮毛肺氣不得升降也麻黃湯主之輕者止嗽散膀胱之虛腎氣不化也脈左尺必細沉其症為小便不禁為勞淋為老淋小便不禁者氣虛不能統攝也十補湯主之勞淋者勞力辛苦氣虛不化也補中益氣湯主之老淋者老人思色精不出而內敗大小便牽痛如淋宜萆薢分清飲去黃柏加菟絲遠志以去其精再服六味地黃丸膀胱之實脈左尺必洪大其症為氣淋為血淋為關格為膀胱氣氣淋者氣滯水道阻塞臍下脹痛也假蘇散主之血淋者蓄瘀莖中割痛難忍也生地四物湯加紅花桃仁花蕊石主之關格者溺閉而吐逆也假蘇散主之膀胱氣者一名胞痹氣結膀胱少腹熱澀於小便也橘核丸主之膀胱之寒左尺必沉遲其症為冷淋冷淋者寒氣堅閉水道肢冷喜熱也金匱腎氣丸主之膀胱之熱左尺必數其症為小便不通為膏淋為石淋為便膿血為發狂小便不通者渴則熱在上焦四苓散加山梔黃芩不渴則熱在下焦滋腎丸主之膏淋者滴液如膏也萆薢分清飲主之石淋者下如沙石也益元散加琥珀主之便膿血者心氣移熱於膀胱也阿膠散主之發狂者傷寒熱結膀胱下焦蓄血少腹硬滿也調胃承氣湯主之膀胱部藥隊補膀胱藥即補腎之藥腎氣化則小便自行瀉膀胱猛將羌活麻黃防己木通葶藶豬苓次將獨活防風蒲黃川楝子前胡藁本澤瀉蔥涼膀胱猛將甘遂龍膽草次將車前子茵陳海金沙川黃柏溫膀胱猛將吳茱萸次將烏藥茴香膀胱部列方假蘇散治氣淋荊芥陳皮香附炒麥芽瞿麥木通赤苓各二錢生地四物湯治血淋生地三錢歸身赤芍各一錢五分川芎一錢香蘇散桂枝湯麻黃湯止嗽散益元散補中益氣湯六味地黃丸金匱腎氣丸調胃承氣湯以上諸方俱見卷一十補丸萆薢分清飲阿膠散三方見心部橘核丸見肝部四苓散見脾部滋腎丸見腎部膽部足少陽屬腑膽者清虛之府居半表半裡之交與肝為表裡氣血足則膽氣壯氣血虛則膽氣怯膽受邪即陰陽交戰而寒熱往來故瘧症之來不一而總不離乎少陽也然其擔事之力猶中正之官不偏不倚決斷出焉膽有表症左關脈必浮而弦其症為頭汗為寒熱往來頭汗者寒邪將化火也小柴胡湯加丹皮主之寒熱往來者陰陽相爭也小柴胡湯主之膽之虛左關脈必細軟其症為驚悸為太息驚悸者心血不足以壯之也安神定志丸主之太息者氣虛也四君子湯主之膽之實左關脈必洪其症為胸滿為脅痛為耳聾胸滿者邪氣結聚也小柴胡湯加枳殼桔梗主之脅痛者邪入膽經布之脅下也小柴胡湯加山梔枳殼主之耳聾者氣火上衝而閉也逍遙散加蔓荊石菖蒲香附主之或小柴胡湯膽之寒脈左關必遲其症為精滑為嘔吐為舌苔滑精滑者肢腫食少心虛煩悶坐臥不安溫膽湯主之嘔吐者邪正相爭也小柴胡湯加藿香湯主之舌苔滑者邪未化火也二陳湯主之膽之熱脈左關必弦數其症為口苦為嘔吐為盜汗為目眩口苦者熱在膽膽汁泄也小柴胡湯主之嘔吐者膽移熱於胃也小柴胡湯加姜炒竹茹主之盜汗者熱開腠理也小柴胡湯加丹皮主之目眩者膽附於肝肝竅在目熱故眩也小柴胡湯加山梔主之膽部藥隊補膽猛將烏梅次將棗仁瀉膽猛將桔梗青皮次將柴胡香附秦艽川芎涼膽猛將龍膽草次將青蒿槐實溫膽猛將肉桂細辛次將山茱萸膽部列方溫膽湯治膽氣虛寒夢遺精滑等症製半夏一錢五分枳實八分陳皮茯苓各一錢五分人參一錢熟地炒棗仁各三錢遠志一錢五味子一錢甘草炙五分生薑三片棗一枚小柴胡湯四君子湯逍遙散以上三方俱見卷一安神定志丸見心部二陳湯見肝部大腸部手陽明屬腑大腸者腎陰之竅傳道之官受事於脾胃而與肺金相表裡故肺氣虛則腸若墜而氣為之陷腸液少則肺亦燥而鼻為之干其呼吸甚密邇也然腸口上接小腸下通穀道為諸臟泄氣之門啟閉一失職而諸臟困矣大腸無表症皆屬於里大腸虛者氣虛也脈右尺必沉弱其症為久痢為脫肛久痢者氣血不足也歸脾湯十全大補湯補中益氣湯加烏梅均可脫肛者氣虛下陷也補中益氣湯加荷葉主之大腸實者胃實移熱也脈右尺必洪實其症為便閉為臟毒為燥渴譫語發狂為腸癰便閉者實火閉也小承氣湯主之臟毒者腸胃不清下如魚腸如豆汁也芍藥甘草湯主之燥渴譫語發狂者燥屎不出也小承氣湯主之腸癰者當臍而痛溺數如淋千金牡丹皮散主之大腸寒者積冷也脈右尺必沉遲其症為久痢為便血久痢者腹綿綿痛寒積在腸也鴉膽子包粉團吞之便血者肢冷喜熱寒在腸也附子理中湯加歸芍主之大腸熱者肺經移熱居多脈右尺必數其症為便血為腸風為脫肛便血者口燥唇焦熱在腸也芍藥甘草湯加黃芩丹皮生地腸風者臟腑有熱風邪乘之故下血而腹不痛清魂散主之脫肛者腸有火則脫出難收腫而痛也三黃解毒湯加知母荷葉主之大腸部藥隊補大腸猛將淫羊藿罌粟殼次將訶子肉百合瀉大腸猛將大黃桃仁雷丸麻仁升麻紫草次將秦艽旋覆花郁李仁杏仁大腹皮白芷梨汁涼大腸猛將黃芩黃柏次將地榆槐實知母連翹溫大腸猛將胡椒破故紙枸杞次將當歸大腸部列方千金牡丹皮散治腸癰丹皮苡仁各五錢栝蔞仁一錢五分桃仁十二粒研水煎服如大便閉加大黃錢半當歸三錢鴉膽子方治久痢寒積在腸用鴉膽子一個蒸透將米粉包作糰子蒸熟以開水囫圇吞下空心服清魂散治腸風下鮮血而腹不痛者荊芥炒黑三錢當歸五錢十全大補湯補中益氣湯附子理中湯小承氣湯以上諸方俱見卷一歸脾湯見心部芍藥甘草湯見肝部三黃解毒湯見胃部小腸部手太陽屬腑小腸者受盛之官化物出焉其上口即胃下口水穀由此而入其下口即大腸上口此處泌別清濁俾水液注入膀胱滓穢流入大腸是腑中之有鑑別者故與心相表裡脈附於膀胱而在左尺小腸無表症皆屬於里小腸虛左尺脈必細軟其症為溺赤短為腰痛溺赤短者水不勝火也生地黃湯主之腰痛者水不足也六味地黃丸主之小腸實左尺脈必洪弦其症為小腸氣為交腸小腸氣者氣滯下焦臍下轉痛失氣則快也橘核丸主之交腸者陰陽拂逆大小腸交也五苓散主之小腸寒左尺脈必遲其症為咳嗽失氣咳嗽失氣者小腸嗽也止嗽散加芍藥主之小腸熱左尺脈必數其症為溺澀溺短溺澀溺短者濕熱壅滯也導赤散主之小腸部藥隊補小腸猛將生地瀉小腸猛將木通次將瞿麥海金沙川楝子苡仁赤芍赤茯苓燈草小腸部列方生地黃湯六味地黃丸五苓散止嗽散俱見卷一導赤散見心部橘核丸見肝部三焦部手少陽屬腑三焦者人生三元之氣臟腑空處是也上焦心肺居之中焦脾胃居之下焦肝腎膀胱大小腸居之其氣總領臟腑營衛經絡內外左右上下之氣三焦通則竟體調和斯其職已三焦之病屬於臟腑並無另立病名三焦部藥隊補三焦猛將淫羊藿黃耆瀉三焦猛將青皮木香次將柴胡香附溫三焦次將烏藥白豆蔻胡桃涼三焦次將山梔麥冬黃柏地骨青蒿連翹心包絡部手厥陰屬腑心包絡者即膻中與心相附居膈上代君行事臣使之官喜樂出焉其見證有手中熱心中大熱面黃目赤心中動諸端而要之包絡之病即心部之病也言心不必更言包絡矣
