body:
  text: 卷一診脈歌病人雙腕仰高骨定為關住掌後之高骨定為關脈寸脈量虎口尺脈准臂彎關前距虎口一寸故曰寸關後距臂彎一尺故曰尺左寸心包絡左關膽與肝左尺司何職膀胱腎系焉右寸胸中肺胃脾屬右關要知大腸腎右尺自昭然口鼻一呼吸脈來四五跳此是無病者平和氣血調三至為遲候六至作數教遲則寒之象數則熱之標一二寒愈盛七八熱更饒輕舉得皮面表邪脈故浮若是病在裡重取須沉求洪長征實健細弱識虛柔水濕並痰飲滑利又弦遒緊促氣內亂伏澀氣凝留妊娠中止代失血中空芤代脈中止芤脈中空只此尚易見其他渺以幽望舌色舌者心之竅凡病俱現於舌能辨其色症自顯然舌尖主心舌中主脾胃舌邊主肝膽舌根主腎假如津液如常口不燥渴雖或發熱尚屬表症若舌苔粗白漸厚而膩是寒邪入胃挾濁飲而欲化火也此時已不辨滋味矣宜用半夏藿香逮厚膩而轉黃色邪已化火也用半夏黃芩若熱甚失治則變黑胃火甚也用石膏半夏或黑而燥裂則去半夏而純用石膏知母麥冬花粉之屬以潤之至厚苔漸退而舌底紅色者火灼水虧也用生地沙參麥冬石斛以養之此表邪之傳裡者也其有脾胃虛寒者則舌白無苔而潤甚者連唇口面色俱痿白此或泄瀉或受濕脾無火力速宜黨參焦朮木香茯苓炙草乾薑大棗以振之虛甚欲脫者加附子肉桂若脾熱者舌中苔黃而薄宜黃芩心熱者舌尖必赤甚者起芒刺宜黃連麥冬竹捲心肝熱者舌邊赤或芒刺宜柴胡黑山梔其舌中苔厚而黃者胃微熱也用石斛知母花粉麥冬之類若舌中苔厚而黑燥者胃大熱也必用石膏知母如連牙床唇口俱黑則胃將蒸爛矣非石膏三四兩生大黃一兩加糞金汁人中黃鮮生地汁天冬麥冬汁銀花露大劑之投不能救也此唯時疫發癍及傷寒症中多有之余嘗治一獨子先後用石膏至十四斤余而癍始透病始退此其中全恃識力再有舌黑而潤澤者此係腎虛宜六味地黃湯若滿舌紅紫色而無苔者此名絳舌亦屬腎虛宜生地熟地天冬麥冬等更有病後舌絳如鏡發亮而光或舌底嗌乾而不飲冷此腎水虧極宜大劑六味地黃湯投之以救其津液方不枯涸望聞問切論望者看形色也聞者聽聲音也問者訪病情也切者診六脈也四事本不可缺一而唯望與問為最要何也蓋聞聲一道不過審其音之低高以定虛實嗽之悶爽以定升降其他則無可聞者切脈一道不過辨其浮沉以定表裡遲數以定寒熱強弱以定虛實其他則胸中了了指下難明且時大時小忽浮忽沉六脈亦難定準故醫家謂據脈定症是欺人之論也惟細問情由則先知病之來歷細問近狀則又知病之深淺而望其部位之色望其唇舌之色望其大小便之色病情已得八九矣而再切其脈合諸所問所望果相符否稍有疑義則默思其故兩兩相形虛與實相形寒與熱相形表與里相形其中自有把握之處即可定斷慎斯術也以往其無所失矣表裡虛實寒熱辨凡人之病不外乎陰陽而陰陽之分總不離乎表裡虛實寒熱六字盡之夫里為陰表為陽虛為陰實為陽寒為陰熱為陽良醫之救人不過能辨此陰陽而已庸醫之殺人不過錯認此陰陽而已假如發熱惡寒鼻塞咳嗽頭痛脈浮舌無苔口不渴此病之在表者也如或潮熱惡熱口燥舌黃腹痛便澀脈沉此病之在裡者也假如氣短體弱多汗驚悸手接心腹四肢畏冷脈來無力此病之本虛者也若病中無汗或狂躁不臥腹脹拒按脈實有力此病之又實者也假如唇舌俱白口不渴喜飲熱湯鼻流清涕小便清大便溏手足冷脈遲此病之犯寒者也若舌赤目紅口渴喜冷煩躁溺短便祕或唇燥舌乾此病之患熱者也凡此皆陰陽之分也至於邪盛正衰陰虛火亢等則又陰中之陽陽中之陰其間毫釐千里命在反掌辨之者安得而不慎表治宜發散也如初感風寒發熱頭痛但用蘇梗一錢五分荊芥一錢五分防風一錢川芎一錢甘草五分生薑二片以散之頭痛甚加羌活六分如鼻塞或流清涕加半夏一錢五分茯苓陳皮各一錢如咳嗽則加桔梗七分杏仁三錢前胡一錢之類一劑得汗而熱即退不必再服但避風寒忌油膩未得汗則再劑而止若寒熱往來欲作瘧狀宜用柴胡八分酒芩八分赤芍一錢製半夏一錢五分甘草五分大棗三枚生薑三片以和之虛者加防黨二錢此其症在表切勿妄用枳殼神麯麥芽消導之藥引邪入內里治宜歸經也有虛實有寒熱宜辨其病在何臟腑而治之法詳臟腑門惟喜怒憂思悲恐驚謂之七情此里症之最難治者但寬其心而藥始效否則無益也然症在於里大忌發散散之則虛者汗脫熱者煽熾醫家動輒用表可懼哉虛治宜補也然有陰虛有陽虛血虛者為陰虛宜補其血輕者用生地四錢首烏二錢歸身一錢五分酒芍一錢五分炙鱉甲二錢穭豆皮三錢海參三錢北沙參三錢之類重者用熟地五錢枸杞三錢五味七分萸肉一錢菟絲一錢以填之氣虛者為陽虛宜補其氣輕者用黨參三錢白朮二錢山藥二錢茯苓一錢五分炙草六分紅棗六枚生薑一片之類重者用人參一錢黃耆一錢五分以振之氣欲脫則並加附子二錢乾薑二錢以回陽若氣血兼虛則陰陽並補八珍湯十全大補湯皆聖藥也實治宜瀉也心有火邪肺有風寒脾有食積蟲痞濕熱肝有鬱怒之氣膽胃包絡膀胱大小腸各能受邪皆為實症治法詳各臟腑門然治實以速為功苟遷延日久病未去而元氣虛則難以消導矣寒治宜溫也寒在表則惡風寒宜蘇葉一錢藿梗二錢荊芥防風各一錢前胡一錢五分杏仁三錢生薑三片之屬以散其邪甚則桂枝五分麻黃五分細辛六分寒在裡則喜熱湯宜制夏二錢藿香一錢五分焦術一錢五分制朴一錢吳茱萸八分焦穀芽三錢煨姜二片砂仁二粒之屬以暖其中甚則附子六分肉桂六分乾薑六分凡寒症唇舌必白脈遲便利腹或冷痛一投寒涼入口立脫慎之熱治宜涼也然熱症有實火有虛火實火之症或因外感或因內郁所致宜分臟腑治之火之微者黑山梔一錢五分石斛三錢地骨皮二錢青蒿一錢五分丹皮一錢連翹一錢五分麥冬二錢花粉一錢五分銀花三錢竹葉五分燈心一握之屬甚者加黃連七分黃芩一錢五分或石膏四錢知母一錢五分極甚則用大黃一錢五分龍膽草七分等虛火之症或陽虛外熱口不渴唇不紅脈不數宜四君子湯以補其陽若陰虛內熱舌或絳頭或痛目或干過午便熱宜四物湯六味地黃湯以補其陰內傷外感雜治說前言表裡虛實寒熱六字病已盡在其中矣而表裡之中又有內傷外感之治焉內傷者里症也而有氣血痰鬱四字之分外感者表症也而有風寒暑濕燥火六字之別再詳其治法醫無餘蘊矣內傷一曰氣氣虛者四君子湯若氣實而滯者宜香蘇散平胃散二曰血血虛者四物湯若血實而凝者宜手拈散三曰痰痰輕者二陳湯六君子若頑痰膠固變生怪症或停飲膈間宜滾痰丸小半夏加茯苓湯之類四曰郁凡喜怒憂思悲恐驚皆能致郁郁小者越鞠丸逍遙散若五郁互結腹膨腫滿二便不通宜神佑丸承氣湯之類此內傷之治也外感一曰風真中風是也非表治中之偶感風寒也風有中腑中臟中血脈之殊中腑者與傷寒同太陽用加味香蘇散陽明用葛根湯少陽用小柴胡湯中臟者眩僕昏冒痰聲如鋸內有熱風寒風二種熱閉則先用搐鼻散次以牛黃丸灌之便結脹用三花湯冷脫則汗珠頭搖以附子理中湯急救之或三生飲中血脈者口眼喎斜半身不遂大秦艽湯加竹瀝薑汁鉤藤二曰寒傷寒是也寒在表則與風之中腑治同寒入里用附子理中湯法詳傷寒論三曰暑暑輕者但煩渴益元散足矣暑重者汗喘昏悶消暑丸灌之寒包暑者頭痛惡寒而煩渴四味香薷飲加荊芥秦艽若暑天受濕而霍亂藿香正氣散主之更有乾霍亂症吐瀉不得俗名絞腸痧粥飲入口即敗危症也陳香丸煎湯救之四曰濕或受潮或食冷面黃身重平胃散治之若黃疸則目溺色黃茵陳大黃湯茵陳五苓散茵陳姜附湯若發腫五苓散五皮飲若滲入筋絡肩背臂痛用秦艽天麻湯蠲痹湯五曰燥此症惟秋冬時久晴有之而嗜鴉片者更易犯其症鼻乾口渴咽痛舌燥目火便祕乾熱不宜發表宜用生地天冬麥冬花粉沙參元參歸身梨藕蔗汁之類以潤之六曰火治法詳於前熱治中更審其臟腑投涼則得矣然中寒則暴痛中暑則猝悶中濕則痰塞中火則竅閉皆能猝然昏倒非中風而似中風謂之類中勿概作中風治此外感之治也傷寒論治傷寒之症與春溫夏熱不同溫熱症頭痛發熱必不惡寒而口渴若傷寒則異是其症由表而入里初起時邪在太陽膀胱經則頭痛惡寒發熱脈浮宜加味香蘇散或桂枝湯麻黃湯柴葛解肌湯繼傳陽明胃經則目痛鼻乾唇焦不渴宜葛根湯再傳少陽膽經則目眩耳聾胸滿脅痛口苦寒熱往來頭汗脈弦宜小柴胡湯此三陽傳經之表症也失治則傳入三陰矣其傳入太陰脾經者則腹滿痛下利脈沉宜大柴胡湯其傳入少陰腎經者口燥咽乾痛利清水目不明危矣宜小承氣湯大承氣湯至傳入厥陰肝經者小腹滿舌卷囊縮厥逆用大承氣湯或有得生者亦有不傳三陰而傳入太陽膀胱者則口渴溺赤宜五苓散傳入陽明胃腑者則譫語狂亂燥渴便閉轉失氣自汗不得眠宜白虎湯調胃承氣湯以上為傳經傷寒因寒化火也其有初起寒邪直中三陰者其症腹冷痛吐清沫利清穀蜷臥肢冷囊縮吐蛔舌黑而潤脈沉細此寒症也中太陰脾理中湯中少陰腎四逆湯中厥陰肝白通加豬膽汁湯急投勿緩此係醫中第一要症故專論之虛勞論治虛勞之症大症也固由真陰虧損虛火鑠金而然而其始大半由於外感感邪在肺則作咳嗽治失其宜則咳不已久咳則傷肺金金傷不能生水則腎水日枯腎火日熾上灼於肺再復嗜色欲受外邪以竭其水而虛勞成矣間有本元不足思慮太過而心血耗心火旺腎水乾肺金痿者其受病不同及其成勞一也此等症多兒吐血痰湧發熱夢遺經閉以及肺痿肺疽咽痛音啞側臥傳尸鬼注諸疾唯在屏棄一切不近女色調飲食慎風寒息嗔怒靜養二三年服藥可不服藥亦可自然生機徐轉復其天和非旦夕所能效也然既有症必有治列方備擇仍在其人之能自養耳咳嗽初起用止嗽散加蘇梗以散之如或不已變生虛熱者佐以團魚丸若病勢漸深更佐以月華丸若吐血先用四生丸繼用生地黃湯逍遙散之類元氣虛五味異功散如氣血虛而發熱八珍湯人參養榮湯均可咽痛用百藥煎散音啞用通音煎如遺精用祕精丸經閉澤蘭湯至五臟虛損則補天大造丸用藥之法不過如斯而已此症十存一二其能存者皆自養之功非藥力也疫痢瘧腫論治疫痢瘧三症最多腫最難治故合提而論疫有由天時者有由人染者由天時則邪從經絡入為頭痛發熱咳嗽頸腫發頤大頭天行之類用香蘇散普濟消毒飲治之由人染則邪從口鼻入為憎寒壯熱胸膈滿悶口吐黃涎之類用神朮散藿香正氣散治之此兩路之邪若傳入臟腑漸至譫語腹脹唇焦口渴者宜治疫清涼散承氣湯治之總不越乎發散解穢清中攻下四法而已痢症則生死所關良由夏秋之際暑熱在中而為風寒生冷所遏火不得舒迫而為痢也熱者為赤寒者為白熱傷血分者為赤寒傷氣分者為白初起時不宜妄攻宜葛根治痢散以解之餘邪未已裡急後重則用治痢奇方以清之腹脹痛有堅積則用朴黃丸下之日久脾虛五味異功散加白芍黃連木香清補之氣虛下陷者補中益氣湯升提之如邪穢塞胃嘔逆不食者開噤散啓之此一定之治法也瘧則輕於痢矣寒邪入內陰陽相搏初起寒熱往來用香蘇散逐之隨用小柴胡湯和之三四發後止瘧丹加白蔻仁醋炒鱉甲以截之久瘧元虛六君子湯加柴胡補之中氣下陷補中益氣湯舉之此易治也唯腫脹一症目胞與足先腫者水也先腹大後四肢腫者臌脹也鼓脹症用和中丸虛者白朮丸水腫症四肢腫而腹不腫者表也腹亦腫者里也腰以上腫邪在表也宜汗五皮飲加蘇葉素艽防風荊芥腰以下腫邪在裡也宜利小便五皮飲加赤小豆赤苓澤瀉車前萆薢防己且煩渴便閉者陽水熱也五皮飲加連翹黃柏黃芩不煩渴者陰水寒也五皮飲加附子乾薑肉桂先腫而後喘或但腫而不喘者胃經蓄水也五皮飲照前加減治之若先喘而後腫者腎經聚水也金匱腎氣丸治之此症最難收功慎勿誤治更有中風後熱傷經絡足不任地腿腫脹痛者此脈痿也用蒼朮黃柏芩連冬斛當歸地黃苡仁牛膝寄生萆薢丹參之類又有腫痛在腳名曰腳氣風濕勝也用檳榔防己秦艽天麻獨活牛膝桑枝木瓜之類附列諸方六味地黃湯滋水制火專治血虛亦可為丸大熟地四錢山萸肉山藥各二錢丹皮茯苓澤瀉各一錢五分八珍湯治氣血並虛即四君四物相併大熟地四錢西黨參三錢白朮當歸各二錢茯苓二錢白芍一錢五分川芎一錢炙甘草五分加大棗二枚十全大補湯治陰陽並虛而畏冷即八珍湯加黃耆二錢肉桂六分四君子湯治氣虛脾胃不足之症人參三錢土炒白朮二錢茯苓二錢炙甘草五分加生薑二片大棗三枚古方用人參如無力以西黨參代之六君子湯治氣虛挾痰即四君子湯加製半夏一錢五分陳皮一錢香砂六君子湯治胃寒吐瀉即六君子湯加藿香一錢砂仁二粒五味異功散治氣虛即四君子湯加陳皮一錢四物湯治血虛肝腎不足之症大熟地四錢歸身白芍各二錢川芎一錢香蘇散治時邪感冒頭痛發熱等症蘇葉一錢五分陳皮香附各一錢二分荊芥秦艽防風蔓荊子各一錢川芎五分甘草七分加生薑三片平胃散加減治脾胃不和脹滿嘔吐霍亂等症藿香一錢五分厚朴一錢二分蒼朮八分陳皮一錢二陳湯治肺胃寒痰製半夏陳皮茯苓各一錢五分炙草八分加生薑一片棗二枚手拈散治血滯心腹作痛元胡索醋炒五靈脂醋炒草果沒藥各等分上為細末每服三錢熱酒調下滾痰丸治老痰變生怪症大黃炒黃芩各四兩青礞石沉香各三錢辰砂二錢以水為丸辰砂為衣每服一二錢開水下小半夏加茯苓湯治飲停膈間半夏姜炒白茯苓各三錢炙甘草一錢生薑三片加蒼朮更效越鞠丸治郁膈痞滿香附山楂炒神麯炒麥芽川芎蒼朮炒梔子各等分上為末水調丸如桐子大每服五七十丸開水下逍遙散治肝經血虛木鬱柴胡甘草茯苓白朮當歸白芍丹皮黑山梔各一錢薄荷五分神佑丸治沉積變病氣血壅滯濕熱風痰鬱結黑醜二兩大黃一兩芫花大戟甘遂各五錢輕粉一錢上為末用皂角去子煎濃湯糊丸每服必瀉勿可輕用大承氣湯治邪熱閉結或食積堅硬宜下之大黃三錢枳實一錢五分厚朴一錢芒硝三錢小承氣湯治前症稍緩者即前大承氣湯去芒硝葛根湯治邪傳陽明以此解肌葛根二錢升麻秦艽荊芥赤芍各一錢蘇葉白芷各八分甘草五分生薑二片小柴胡湯治寒熱往來少陽瘧疾口苦耳聾胸滿肋痛柴胡二錢赤芍一錢五分甘草半夏各一錢黃芩一錢五分人參五分生薑二片大棗三枚搐鼻散治一切悶症不省人事吹入鼻中有嚏者生細辛皂角各一兩生半夏五錢上為細末入瓷瓶勿泄氣牛黃丸治中風痰火閉結或喘嗽痰壅不省人事牛黃麝香龍腦以上各六錢另研羚羊角當歸防風黃芩柴胡白朮麥冬白芍各七錢半桔梗茯苓杏仁川芎大豆黃卷阿膠各八錢五分蒲黃人參神麯各一兩二錢五分雄黃另研四錢甘草二兩五錢白蘞肉桂各三錢七分乾薑三錢七分犀角一兩山藥三兩五錢大棗五十枚金箔一百五十片為衣上為細末煉蜜同棗膏丸每兩作十丸金箔為衣三化湯治中風入臟熱極閉結厚朴大黃枳實羌活各一錢五分水煎服附子理中湯治臟寒將脫之症用以回陽人參白朮各二錢附子乾薑炙甘草各一錢三生飲治寒風中臟六脈沉細生南星生烏頭生附子各一錢五分生薑五片生木香五分此方用人參兩許同投更有益大秦艽湯治風中經絡口眼歪斜等症秦艽一錢五分炙草川芎當歸芍藥生地熟地茯苓羌活獨活白朮防風白芷黃芩各八分細辛二分如陰雨加生薑三片同煎益元散利竅清暑甘草一兩滑石六兩消暑丸治中暑昏悶製半夏四兩茯苓甘草各二兩共為末生薑汁糊丸四味香薷飲治風寒閉暑之症香薷扁豆厚朴各一錢五分炙甘草五分若兩足轉筋加木瓜茯苓藿香正氣散藿香砂仁厚朴茯苓紫蘇陳皮各一錢白朮製半夏桔梗白芷各七分炙甘草五分茵陳大黃湯治黃疸熱閉茵陳三錢梔子大黃各二錢茵陳五苓散治陰黃小便不利茵陳白朮茯苓各一錢五分豬苓澤瀉各七分薄桂五分茵陳姜附湯治陰黃小便自利茵陳一錢白朮二錢附子乾薑各五分炙草一錢肉桂三分五苓散治小便不通茯苓三錢豬苓澤瀉各八分白朮一錢五分桂枝一錢四苓散治伏暑小便不通即五苓散去桂枝五皮飲治胃經蓄水發為水腫大腹皮茯苓皮陳皮桑白皮各一錢五分生薑皮八分秦艽天麻湯治寒濕入絡肩背臂痛秦艽一錢五分天麻羌活陳皮當歸川芎各一錢炙草五分生薑三片炒桑皮三錢挾寒加桂枝蠲痹湯治風寒濕三氣成痹羌活獨活各一錢桂心五分素艽一錢當歸桑枝各三錢川芎七分海風藤二錢炙甘草五分乳香木香各八分桂枝湯治太陽中風寒桂枝芍藥生薑各一錢五分甘草炙一錢大棗四枚麻黃湯治太陽傷寒無汗此方宜於西北麻黃四錢桂枝二錢甘草炙一錢杏仁十二枚柴葛解肌湯治溫熱症發熱頭痛不惡寒與傷寒異柴胡一錢二分葛根一錢五分赤芍知母各一錢貝母一錢生地二錢黃芩丹皮各一錢五分甘草五分大柴胡湯治傷寒邪入太陰柴胡一錢五分半夏七分黃芩芍藥各二錢枳實一錢大黃二錢白虎湯治陽明胃腑大熱生石膏五錢知母三錢甘草二錢粳米一撮若熱甚者倍之調胃承氣湯治胃熱譫語便閉繞臍硬痛大黃三錢芒硝二錢甘草五分四逆湯治少陰中寒肢冷厥逆附子五錢乾薑五錢炙甘草二錢白通加豬膽汁湯治陰盛格陽熱藥不入附子五錢乾薑五錢蔥白二錢人尿半杯豬膽汁五茶匙止嗽散治一切咳嗽桔梗荊芥紫菀百部白前各二斤甘草炙十二兩陳皮一斤共為末每服三錢初感風寒生薑湯下團魚丸治久咳將成癆瘵川貝知母前胡柴胡杏仁各四錢大團魚一個重十二兩以上者去腸上藥與魚同煮熟取肉連汁食之將藥渣焙乾為末煮魚骨汁為丸如桐子麥冬湯日下三服月華丸滋陰保肺平肝為治癆之聖藥天冬麥冬生地熟地山藥百部沙參川貝真阿膠各一兩茯苓獺肝廣三七各五錢用白菊花二兩桑葉二兩熬膏將阿膠化入和藥煉蜜為丸日三服每服一丸四生丸治熱血妄行而為吐衄生地黃生荷葉生側柏葉生艾葉各等分同搗極爛為大丸如雞子每服一丸水煎去渣生地黃湯治腎火鑠金生地三錢牛膝丹皮黑山梔各一錢丹參元參麥冬白芍各一錢半鬱金廣三七荷葉各七分加陳墨汁清童便各半杯沖服人參養榮湯治氣虛榮衛不固白芍二錢人參蜜炙黃耆當歸白朮熟地各一錢五分炙甘草茯苓遠志各七分北五味桂心陳皮各四分加姜一片棗二枚百藥煎散治咽痛百藥煎五錢硼砂一錢五分甘草二錢共為末米飲調下通音煎治音啞白蜜一斤川貝二兩款冬花二兩胡桃肉十二兩去皮研爛上將川貝款冬為末四味和勻飯上蒸熟開水服祕精丸理脾導濕治濁固精白朮山藥茯苓茯神蓮子肉各二兩芡實四兩蓮花須牡蠣各一兩五錢黃柏五錢車前子三兩共為末金櫻膏為丸澤蘭湯治經閉調血脈澤蘭二錢柏子仁當歸白芍熟地牛膝茺蔚子各一錢五分補天大造丸補五臟虛損人參二兩蜜炙黃耆蒸白朮各三兩炒棗仁當歸山藥茯苓各一兩五錢枸杞子大熟地各四兩河車一具鹿角一斤龜板八兩與鹿角共熬膏以龜鹿膠和藥煉蜜為丸普濟消毒飲治大頭疫症喉風發癍等症甘草桔梗酒芩酒黃連各二錢馬勃元參橘紅柴胡各五分薄荷六分升麻二分連翹牛蒡子各八分神朮散治時行不正之氣滿悶吐瀉發熱傷食蒼朮陳皮厚朴各二斤炙甘草十二兩藿香八兩砂仁四兩共為末每服二三錢治疫清涼散治疫邪入里脹悶譫狂諸症秦艽赤芍知母貝母連翹各一錢荷葉七分丹參五錢柴胡一錢五分人中黃二錢葛根治痢散治痢初起赤白皆效葛根一錢五分酒炒苦參八分陳皮一錢赤芍陳松蘿茶炒麥芽山楂各一錢二分上為細末煎服有火者加川連五分治痢奇方治暑痢川連六分酒芩厚朴歸身白芍各一錢五分山楂三錢甘草五分桃仁青皮紅花各八分枳殼地榆各一錢檳榔一錢二分如白痢加木香六分朴黃丸治堅積作痢腹痛拒按陳皮厚朴各十二兩大黃一斤四兩廣木香四兩荷葉水為丸補中益氣湯中氣下陷以此升之黃耆一錢五分土炒白朮人參當歸炙草各一錢柴胡升麻各三分陳皮五分加生薑一片大棗二枚開噤散治噤口痢人參薑汁炒黃連各五分石菖蒲七分丹參三錢石蓮子茯苓陳皮冬瓜仁去殼各一錢五分陳米一撮荷葉蒂二個止瘧丹治瘧二三發後以此止之火酒炒常山草果仁去殼半夏曲姜炒香附米酒炒青皮醋炒各四兩真六神麯姜炒二兩上為末用米飲糊丸清晨服和中丸治腹脹食積土炒白朮四兩炒扁豆三兩茯苓砂仁各一兩五錢半夏薑汁炒一兩麵炒枳實炒神麯炒麥芽炒山楂薑汁炒香附丹參酒蒸各二兩陳皮五穀蟲炒焦黃色各三兩上為末荷葉一枚煎水為丸白朮丸治氣虛中滿白朮茯苓陳皮各二兩砂仁神麯各一兩五錢五穀蟲四兩用荷葉老米煎水為丸金匱腎氣丸治腎經聚水此即六味丸加附桂車前牛膝大熟地八兩山藥四兩山萸肉丹皮澤瀉車前子牛膝各二兩茯苓六兩肉桂一兩附子一兩如水腫用五加皮八兩煮水煉蜜為丸
